<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CathMath — Hemodynamic Waveforms</title>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
}

/* ===== CSS VARIABLES — DARK (default) ===== */
:root {
  --bg: #0b0e14;
  --bg2: #101520;
  --bg3: #161b26;
  --panel: #131922;
  --panel2: #1a2030;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --text: #c8cdd6;
  --text-hi: #e8ecf2;
  --text-dim: #6b7a8d;
  --navy: #0d2240;
  --accent: #4a90d9;
  --ecg-green: #00e676;
  --right-blue: #42a5f5;
  --left-red: #ef5350;
  --clr-ra: #26c6da;
  --clr-rv: #42a5f5;
  --clr-pa: #ab47bc;
  --clr-pcwp: #ec407a;
  --clr-lv: #ef5350;
  --clr-ao: #ffa726;
  --gradient-fill: rgba(255,193,7,0.18);
  --grid-minor: rgba(255,255,255,0.04);
  --grid-major: rgba(255,255,255,0.09);
  --normal-ghost: rgba(255,255,255,0.55);
  --sidebar-w: 180px;
  --nav-h: 42px;
  --header-h: 38px;
  --controls-h: 54px;
}

/* ===== LIGHT MODE ===== */
body.light {
  --bg: #f0f2f5;
  --bg2: #e4e8ec;
  --bg3: #dce0e6;
  --panel: #ffffff;
  --panel2: #f6f7f9;
  --border: rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.16);
  --text: #1a1a2e;
  --text-hi: #0d0d1a;
  --text-dim: #6b7280;
  --ecg-green: #2e7d32;
  --right-blue: #1565c0;
  --left-red: #c62828;
  --clr-ra: #00838f;
  --clr-rv: #1565c0;
  --clr-pa: #7b1fa2;
  --clr-pcwp: #ad1457;
  --clr-lv: #c62828;
  --clr-ao: #e65100;
  --gradient-fill: rgba(255,152,0,0.22);
  --grid-minor: rgba(0,0,0,0.05);
  --grid-major: rgba(0,0,0,0.12);
  --normal-ghost: rgba(0,0,0,0.40);
}

/* ===== SITE NAV ===== */
.site-nav {
  background: #0a1628; color: #fff;
  display: flex; align-items: center;
  padding: 0 24px; height: var(--nav-h);
  position: relative; z-index: 200;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
body.light .site-nav { background: #0a1628; color: #fff; }
.nav-brand { font-size: 16px; font-weight: 800; letter-spacing: 0.5px; margin-right: 32px; color: #fff; text-decoration: none; }
.nav-tabs { display: flex; gap: 0; height: 100%; }
.nav-tab {
  display: flex; align-items: center; padding: 0 18px; height: var(--nav-h);
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5);
  text-decoration: none; border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.nav-tab:hover { color: rgba(255,255,255,0.85); }
.nav-tab.active { color: #fff; border-bottom-color: #4a90d9; }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.nav-credit { font-size: 11px; opacity: 0.5; font-weight: 400; }
.nav-right button {
  background: rgba(255,255,255,0.1); color: #fff;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 12px; border-radius: 4px; cursor: pointer;
  font-size: 11px; font-weight: 600; transition: background 0.2s;
}
.nav-right button:hover { background: rgba(255,255,255,0.2); }

/* ===== PAGE HEADER ===== */
.page-header {
  background: var(--bg2);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: var(--header-h);
  border-bottom: 1px solid var(--border);
}
.page-header h1 { font-size: 15px; font-weight: 700; color: var(--text-hi); }
.page-header .page-sub { font-size: 11px; color: var(--text-dim); margin-left: 12px; }

/* ===== LAYOUT ===== */
.app-body {
  display: flex;
  height: calc(100vh - var(--nav-h) - var(--header-h));
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 10px 0;
}
.sidebar-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
  color: var(--text-dim); padding: 12px 16px 4px; user-select: none;
}
.sidebar-sep { height: 1px; background: var(--border); margin: 6px 12px; }
.lesson-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 16px; border: none; background: none;
  font-size: 12.5px; font-weight: 500; color: var(--text);
  cursor: pointer; text-align: left; transition: background 0.15s;
  border-left: 3px solid transparent;
}
.lesson-btn:hover { background: var(--bg2); }
.lesson-btn.active { background: var(--bg2); color: var(--text-hi); font-weight: 700; border-left-color: var(--accent); }
.lesson-btn .ldot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* ===== MAIN AREA ===== */
.main-area {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg);
}

/* ===== CANVAS AREA ===== */
.canvas-area { flex: 1; position: relative; overflow: hidden; }
#ecgCanvas { width: 100%; height: 50px; display: block; border-bottom: 1px solid var(--border); }
#waveCanvas { width: 100%; display: block; }

/* ===== CONTROLS ROW ===== */
.controls-row {
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  padding: 8px 20px; height: auto; min-height: var(--controls-h);
  background: var(--panel); border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.ctrl-group { display: flex; align-items: center; gap: 6px; }
.ctrl-label { font-size: 11px; font-weight: 600; color: var(--text-dim); white-space: nowrap; }
.ctrl-val { font-size: 11px; font-weight: 700; color: var(--text-hi); min-width: 32px; text-align: center; }
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 2px; background: var(--border2);
  outline: none; cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--accent); border: 2px solid var(--bg);
  cursor: pointer;
}
.ctrl-check { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.ctrl-check input { cursor: pointer; }
.ctrl-check label { font-size: 11px; font-weight: 500; color: var(--text); cursor: pointer; }

/* Trace toggles */
.trace-toggles { display: flex; gap: 3px; }
.trace-tog {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border: 1px solid var(--border2); border-radius: 3px;
  cursor: pointer; background: none; color: var(--text-dim);
  transition: all 0.15s;
}
.trace-tog.on { border-color: currentColor; }

/* ===== TEACHING PANEL ===== */
.teaching-panel {
  height: 200px; min-height: 120px;
  overflow-y: auto; padding: 14px 20px;
  background: var(--panel2); border-top: 1px solid var(--border);
}
.teaching-panel h3 {
  font-size: 13px; font-weight: 700; color: var(--text-hi);
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.teaching-panel h3 .tag {
  font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
  background: var(--accent); color: #fff; text-transform: uppercase; letter-spacing: 0.5px;
}
.tp-grid { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
.tp-pearls { list-style: none; }
.tp-pearls li {
  font-size: 12px; line-height: 1.5; color: var(--text);
  padding: 3px 0; padding-left: 14px; position: relative;
}
.tp-pearls li::before {
  content: "▸"; position: absolute; left: 0; color: var(--accent); font-size: 11px;
}
.tp-body { font-size: 12px; line-height: 1.6; color: var(--text); }
.tp-body strong { color: var(--text-hi); }
.tp-body .highlight { color: #ffc107; font-weight: 600; }

/* ===== CALCULATOR PANEL ===== */
.calc-panel {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px 16px; margin-top: 10px;
}
.calc-panel h4 { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.calc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.calc-row label { font-size: 11px; color: var(--text-dim); min-width: 80px; }
.calc-row input[type="number"] {
  width: 72px; padding: 3px 6px; border: 1px solid var(--border2);
  border-radius: 3px; background: var(--bg); color: var(--text-hi);
  font-size: 12px; font-weight: 600; text-align: center;
}
.calc-row input[type="number"]:focus { outline: none; border-color: var(--accent); }
.calc-result {
  font-size: 13px; font-weight: 700; padding: 6px 10px;
  background: var(--bg2); border-radius: 4px; margin-top: 8px;
  color: var(--text-hi);
}
.calc-result .val { color: #ffc107; font-size: 15px; }
.calc-result .sev { font-size: 11px; font-weight: 600; margin-left: 8px; }
.sev-mild { color: #66bb6a; }
.sev-mod { color: #ffa726; }
.sev-sev { color: #ef5350; }
.sev-crit { color: #ff1744; }

/* ===== EQUATIONS PANEL ===== */
#equationsPanel {
  position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
  background: var(--bg); padding: 24px 28px; display: none; z-index: 5;
}
#equationsPanel.active { display: block; }
.eq-header {
  margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border2);
}
.eq-header h2 { font-size: 16px; font-weight: 700; color: var(--text-hi); margin-bottom: 4px; }
.eq-header p { font-size: 11.5px; color: var(--text-dim); line-height: 1.5; }
.eq-header a { color: var(--accent); text-decoration: none; }
.eq-header a:hover { text-decoration: underline; }
.eq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .eq-grid { grid-template-columns: 1fr; } }
.eq-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 18px; display: flex; flex-direction: column;
}
.eq-card h3 {
  font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.eq-formula {
  background: var(--bg2); border-radius: 6px; padding: 12px 16px; margin-bottom: 10px;
  text-align: center; font-size: 15px; color: var(--text-hi); line-height: 1.8;
}
.eq-formula .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 3px; }
.eq-formula .frac-num { border-bottom: 1.5px solid var(--text-dim); padding: 0 6px 2px; }
.eq-formula .frac-den { padding: 2px 6px 0; }
.eq-formula .eq-sym { color: var(--text-dim); margin: 0 4px; }
.eq-formula .eq-var { color: #ffc107; font-weight: 600; }
.eq-formula .eq-const { color: var(--text-dim); }
.eq-explain {
  font-size: 11.5px; color: var(--text); line-height: 1.65; margin-bottom: 10px;
}
.eq-explain strong { color: var(--text-hi); }
.eq-explain .eq-tip { color: #66bb6a; font-style: italic; }
.eq-mini-calc {
  background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
  padding: 8px 10px; margin-top: auto;
}
.eq-mini-calc .mc-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
.eq-mini-calc .mc-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.eq-mini-calc label { font-size: 10.5px; color: var(--text-dim); min-width: 55px; }
.eq-mini-calc input[type="number"] {
  width: 58px; padding: 2px 4px; border: 1px solid var(--border2);
  border-radius: 3px; background: var(--bg2); color: var(--text-hi);
  font-size: 11px; font-weight: 600; text-align: center;
}
.eq-mini-calc input[type="number"]:focus { outline: none; border-color: var(--accent); }
.eq-mini-calc .mc-result {
  font-size: 12px; font-weight: 700; color: #ffc107; padding: 4px 0 0;
}
.eq-interp { font-size: 10.5px; line-height: 1.5; margin-top: 8px; color: var(--text); }
.eq-interp strong { color: var(--text-hi); }
.eq-norm { color: #66bb6a; }
.eq-warn { color: #ffa726; }
.eq-alert { color: #ef5350; }

/* ===== RESIZE HANDLE ===== */
.resize-handle {
  height: 6px; cursor: ns-resize; background: var(--border);
  transition: background 0.15s; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.resize-handle::after {
  content: ''; width: 36px; height: 3px; border-radius: 2px;
  background: var(--text-dim); opacity: 0.4; transition: opacity 0.2s;
}
.resize-handle:hover { background: var(--accent); }
.resize-handle:hover::after { opacity: 0.9; background: #fff; }
.resize-hint {
  position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--text-dim); pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
  white-space: nowrap;
}
.resize-handle:hover .resize-hint { opacity: 1; }
@keyframes handlePulse {
  0%, 100% { background: var(--border); }
  50% { background: var(--accent); }
}
.resize-handle.pulse { animation: handlePulse 0.8s ease 2; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<!-- SITE NAV -->
<div class="site-nav">
  <a href="/" class="nav-brand">CathMath</a>
  <div class="nav-tabs">
    <a href="/rhc/" class="nav-tab">RHC Calculator</a>
    <a href="/pvloop/" class="nav-tab">PV Loops</a>
    <a href="/ekg/" class="nav-tab">EKG Simulator</a>
    <a href="/embryology/" class="nav-tab">Embryology</a>
    <a href="/hemodynamics/" class="nav-tab active">Hemodynamics</a>
  </div>
  <div class="nav-right">
    <div class="nav-credit">Developer: Saro Avedikian, MD, MPH</div>
    <button id="modeToggle" onclick="toggleMode()">Light Mode</button>
  </div>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div style="display:flex;align-items:baseline;gap:12px;">
    <h1>Hemodynamic Waveforms</h1>
    <span class="page-sub">Interactive Waveform Atlas &amp; Teaching Tool</span>
  </div>
</div>

<!-- APP BODY -->
<div class="app-body">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-label">Valvular</div>
    <button class="lesson-btn active" data-lesson="normal" onclick="switchLesson('normal')">
      <span class="ldot" style="background:#666"></span> Normal Waveforms
    </button>
    <button class="lesson-btn" data-lesson="as" onclick="switchLesson('as')">
      <span class="ldot" style="background:#ef5350"></span> Aortic Stenosis
    </button>
    <button class="lesson-btn" data-lesson="ms" onclick="switchLesson('ms')">
      <span class="ldot" style="background:#ef5350"></span> Mitral Stenosis
    </button>
    <button class="lesson-btn" data-lesson="mr" onclick="switchLesson('mr')">
      <span class="ldot" style="background:#ef5350"></span> Mitral Regurg
    </button>
    <button class="lesson-btn" data-lesson="ar" onclick="switchLesson('ar')">
      <span class="ldot" style="background:#ef5350"></span> Aortic Regurg
    </button>
    <button class="lesson-btn" data-lesson="tr" onclick="switchLesson('tr')">
      <span class="ldot" style="background:#42a5f5"></span> Tricuspid Regurg
    </button>
    <div class="sidebar-sep"></div>
    <div class="sidebar-label">Myopathic</div>
    <button class="lesson-btn" data-lesson="hocm" onclick="switchLesson('hocm')">
      <span class="ldot" style="background:#ffa726"></span> HOCM
    </button>
    <div class="sidebar-sep"></div>
    <div class="sidebar-label">Pericardial</div>
    <button class="lesson-btn" data-lesson="cp" onclick="switchLesson('cp')">
      <span class="ldot" style="background:#66bb6a"></span> Constrictive
    </button>
    <button class="lesson-btn" data-lesson="rcm" onclick="switchLesson('rcm')">
      <span class="ldot" style="background:#ffca28"></span> Restrictive
    </button>
    <button class="lesson-btn" data-lesson="tamp" onclick="switchLesson('tamp')">
      <span class="ldot" style="background:#ef5350"></span> Tamponade
    </button>
    <div class="sidebar-sep"></div>
    <div class="sidebar-label">Other</div>
    <button class="lesson-btn" data-lesson="ph" onclick="switchLesson('ph')">
      <span class="ldot" style="background:#ab47bc"></span> Pulm Hypertension
    </button>
    <button class="lesson-btn" data-lesson="eq" onclick="switchLesson('eq')">
      <span class="ldot" style="background:#ffc107"></span> Equations
    </button>
  </div>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="canvas-area" id="canvasArea">
      <canvas id="ecgCanvas"></canvas>
      <canvas id="waveCanvas"></canvas>
      <div id="equationsPanel"></div>
    </div>

    <!-- CONTROLS ROW -->
    <div class="controls-row">
      <div class="ctrl-group">
        <span class="ctrl-label">HR</span>
        <input type="range" id="hrSlider" min="40" max="140" value="72" style="width:100px" oninput="updateHR(this.value)">
        <span class="ctrl-val" id="hrVal">72</span>
        <span class="ctrl-label">bpm</span>
      </div>
      <div class="ctrl-group" id="severityGroup" style="display:none">
        <span class="ctrl-label">Severity</span>
        <input type="range" id="sevSlider" min="0" max="100" value="80" style="width:110px" oninput="updateSeverity(this.value)">
        <span class="ctrl-val" id="sevVal">Severe</span>
      </div>
      <div class="ctrl-group">
        <button class="trace-tog on" id="pauseBtn" onclick="togglePause()" style="min-width:28px;font-size:13px" title="Pause/Play (Space)">⏸</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Speed</span>
        <button class="trace-tog" id="speed25" onclick="setSpeed(25)">25mm/s</button>
        <button class="trace-tog on" id="speed50" onclick="setSpeed(50)">50mm/s</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Traces</span>
        <div class="trace-toggles" id="traceToggles"></div>
      </div>
      <div class="ctrl-group" id="pvcGroup" style="display:none">
        <button class="trace-tog" id="pvcBtn" onclick="triggerPVC()" style="background:rgba(255,23,68,0.15);color:#ff1744;border-color:#ff1744">Trigger PVC</button>
      </div>
      <div class="ctrl-group" id="provocationGroup" style="display:none">
        <span class="ctrl-label">Provocation</span>
        <input type="range" id="provSlider" min="-100" max="100" value="0" style="width:90px" oninput="updateProvocation(this.value)">
        <span class="ctrl-val" id="provVal" style="min-width:60px;font-size:10px">Baseline</span>
      </div>
      <div class="ctrl-group" id="acuteGroup" style="display:none">
        <button class="trace-tog on" id="acuteBtn" onclick="setAcute(true)">Acute</button>
        <button class="trace-tog" id="chronicBtn" onclick="setAcute(false)">Chronic</button>
      </div>
      <div class="ctrl-group" id="phTypeGroup" style="display:none">
        <button class="trace-tog on" id="phPreBtn" onclick="setPHType('pre')" style="font-size:10px">Pre-cap</button>
        <button class="trace-tog" id="phPostBtn" onclick="setPHType('post')" style="font-size:10px">Post-cap</button>
        <button class="trace-tog" id="phCombBtn" onclick="setPHType('combined')" style="font-size:10px">Combined</button>
      </div>
      <div class="ctrl-group" id="respGroup" style="display:none">
        <button class="trace-tog" id="respBtn" onclick="toggleResp()" style="background:rgba(102,187,106,0.15);color:#66bb6a;border-color:#66bb6a">Respiration</button>
      </div>
      <div class="ctrl-check" id="compareGroup" style="display:none">
        <input type="checkbox" id="compareNormal" onchange="toggleCompare()">
        <label for="compareNormal">Compare Normal</label>
      </div>
      <div class="ctrl-check">
        <input type="checkbox" id="showLabels" checked onchange="redrawNeeded=true">
        <label for="showLabels">Labels</label>
      </div>
      <div class="ctrl-check">
        <input type="checkbox" id="showAnnotations" checked onchange="redrawNeeded=true">
        <label for="showAnnotations">a-c-v-x-y</label>
      </div>
    </div>

    <!-- TEACHING PANEL -->
    <div class="resize-handle" id="resizeHandle"><span class="resize-hint">Drag to resize</span></div>
    <div class="teaching-panel" id="teachingPanel"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════════
// HEMODYNAMIC WAVEFORMS — Phase 1: Core Engine + Normal + AS + MS
// ════════════════════════════════════════════════════════════════════

// ── State ──
let currentLesson = 'normal';
let HR = 72;
let speed = 50; // mm/s
let severity = 80; // 0-100
let compareNormal = false;
let isDark = true;
let redrawNeeded = true;
let animId = null;
let paused = false;
let scrollX = 0;

// WAVEFORM GENERATORS — Parameterized (extending landing page approach)
// ════════════════════════════════════════════════════════════════════

function gauss(beat, center, width) {
  return Math.exp(-0.5 * Math.pow((beat - center) / width, 2));
}

function generateRA(beat, p) {
  let v = p.mean;
  v += p.aAmp * gauss(beat, p.aCenter, p.aWidth);
  if (p.cAmp) v += p.cAmp * gauss(beat, p.cCenter || 0.12, p.cWidth || 0.02);
  v -= p.xDepth * gauss(beat, p.xCenter, p.xWidth || 0.04);
  v += p.vAmp * gauss(beat, p.vCenter, p.vWidth || 0.05);
  v -= p.yDepth * gauss(beat, p.yCenter, p.yWidth || 0.04);
  return Math.max(0, v);
}

function generateRV(beat, p) {
  const uEnd = p.upEnd || 0.05;
  const peakT = 0.08;               // Brief peak (more triangular than LV)
  const ejectEnd = 0.22;            // End of ejection
  const descEnd = p.descEnd || 0.30; // End of rapid descent
  const diaEnd = p.diaEnd || 0.88;
  if (beat < uEnd) {
    // Rapid upstroke
    return p.RVEDP + (beat / uEnd) * (p.RVSP - p.RVEDP);
  } else if (beat < peakT) {
    // Brief rounded peak
    return p.RVSP;
  } else if (beat < ejectEnd) {
    // More triangular descent than LV — RV ejects into low-resistance pulmonary bed
    const t = (beat - peakT) / (ejectEnd - peakT);
    const dropTarget = p.RVSP * 0.4; // drops more during ejection than LV
    return p.RVSP - t * (p.RVSP - dropTarget);
  } else if (beat < descEnd) {
    // Rapid final descent to diastolic
    const t = (beat - ejectEnd) / (descEnd - ejectEnd);
    const start = p.RVSP * 0.4;
    const dipTarget = p.dipMin != null ? p.dipMin : p.RVEDP;
    return start - (start - dipTarget) * (1 - Math.pow(1 - t, 2));
  } else if (beat < diaEnd) {
    // Gradual diastolic rise
    const t = (beat - descEnd) / (diaEnd - descEnd);
    const dipTarget = p.dipMin != null ? p.dipMin : p.RVEDP;
    const endDia = p.RVEDP + (p.diaRise || 1);
    return dipTarget + t * (endDia - dipTarget);
  } else {
    const t = (beat - diaEnd) / (1 - diaEnd);
    const endDia = p.RVEDP + (p.diaRise || 1);
    return endDia * (1 - t) + p.RVEDP * t;
  }
}

function generatePA(beat, p) {
  const uEnd = p.upEnd || 0.08;
  const nStart = p.notchStart || 0.16;
  const nEnd = p.notchEnd || 0.24;
  if (beat < uEnd) {
    return p.PADP + (beat / uEnd) * (p.PASP - p.PADP);
  } else if (beat < nStart) {
    const t = (beat - uEnd) / (nStart - uEnd);
    const postPeak = p.PASP - t * (p.PASP - p.PADP) * 0.55;
    return postPeak;
  } else if (beat < nEnd) {
    const mid = (nStart + nEnd) / 2;
    const base = p.PADP + (p.PASP - p.PADP) * 0.35;
    return base + (p.notchAmp || 2) * Math.sin(((beat - nStart) / (nEnd - nStart)) * Math.PI);
  } else if (beat < 0.85) {
    const decayStart = p.PADP + (p.PASP - p.PADP) * 0.4;
    const t = (beat - nEnd) / (0.85 - nEnd);
    return (decayStart - p.PADP) * Math.exp(-(p.decayRate || 2.0) * t) + p.PADP;
  }
  return p.PADP;
}

function generatePCWP(beat, p) {
  let b = beat - (p.timeDelay || 0.06);
  if (b < 0) b += 1;
  let v = p.mean;
  v += p.aAmp * gauss(b, p.aCenter || 0.08, p.aWidth || 0.04);
  v -= (p.xDepth || 3) * gauss(b, p.xCenter || 0.20, p.xWidth || 0.05);
  v += p.vAmp * gauss(b, p.vCenter || 0.42, p.vWidth || 0.06);
  v -= (p.yDepth || 4) * gauss(b, p.yCenter || 0.58, p.yWidth || p.yWidthVal || 0.05);
  return Math.max(0, v);
}

function generateLV(beat, p) {
  const uEnd = p.upEnd || 0.05;    // End of isovolumic contraction
  const peakT = 0.09;               // Brief systolic peak
  const ejectEnd = 0.27;            // End of ejection phase
  const ivrEnd = 0.34;              // End of isovolumic relaxation
  const rapidFillEnd = 0.44;        // End of rapid early filling
  const diastasisEnd = 0.82;        // End of diastasis (slow fill)
  // Pre-systolic a wave
  const aWave = (p.aAmp || 3) * gauss(beat, 0.92, 0.03);
  const ejectDrop = p.LVSP * 0.06;  // ~6% decline during ejection

  if (beat < uEnd) {
    // Isovolumic contraction — rapid upstroke
    const t = beat / uEnd;
    const rate = p.upRate || 1;
    return p.LVEDP + Math.pow(t, 1 / rate) * (p.LVSP - p.LVEDP);
  } else if (beat < peakT) {
    // Rounded peak — brief at max pressure
    const t = (beat - uEnd) / (peakT - uEnd);
    // Smooth rounded peak using cosine
    return p.LVSP - ejectDrop * 0.15 * (1 - Math.cos(t * Math.PI)) / 2;
  } else if (beat < ejectEnd) {
    // Ejection phase — gradual decline as blood exits
    const t = (beat - peakT) / (ejectEnd - peakT);
    const startP = p.LVSP - ejectDrop * 0.15;
    return startP - t * (ejectDrop * 0.85);
  } else if (beat < ivrEnd) {
    // Isovolumic relaxation — rapid curved descent
    const t = (beat - ejectEnd) / (ivrEnd - ejectEnd);
    const startP = p.LVSP - ejectDrop;
    const diaMin = p.diaMin || 1;
    // Exponential-like rapid drop
    return startP - (startP - diaMin) * (1 - Math.pow(1 - t, 2.5));
  } else if (beat < rapidFillEnd) {
    // Rapid early filling — slight dip then rise
    const t = (beat - ivrEnd) / (rapidFillEnd - ivrEnd);
    const diaMin = p.diaMin || 1;
    const rfTarget = p.LVEDP * 0.5; // rises to ~half of LVEDP
    return diaMin + t * (rfTarget - diaMin);
  } else if (beat < diastasisEnd) {
    // Diastasis — slow/flat filling
    const t = (beat - rapidFillEnd) / (diastasisEnd - rapidFillEnd);
    const rfTarget = p.LVEDP * 0.5;
    const preA = p.LVEDP - (p.aAmp || 3); // just before a-wave
    return rfTarget + t * (preA - rfTarget);
  } else {
    // Atrial contraction (a-wave) bump at end-diastole
    return (p.LVEDP - (p.aAmp || 3)) + aWave;
  }
}

function generateAo(beat, p) {
  const uEnd = p.upEnd || 0.08;
  const peakT = p.peakTime || 0.12;
  const nStart = p.notchStart || 0.30;
  const nEnd = p.notchEnd || 0.36;

  if (beat < uEnd) {
    const t = beat / uEnd;
    const rate = p.upRate || 1;
    return p.DBP + Math.pow(t, 1 / rate) * (p.SBP - p.DBP) * 0.85;
  } else if (beat < peakT) {
    const t = (beat - uEnd) / (peakT - uEnd);
    const pre = p.DBP + (p.SBP - p.DBP) * 0.85;
    return pre + t * (p.SBP - pre);
  } else if (beat < nStart) {
    const t = (beat - peakT) / (nStart - peakT);
    const postPeak = p.SBP;
    const preNotch = p.DBP + (p.SBP - p.DBP) * 0.45;
    return postPeak - t * (postPeak - preNotch);
  } else if (beat < nEnd) {
    const base = p.DBP + (p.SBP - p.DBP) * 0.38;
    const nd = p.notchDepth != null ? p.notchDepth : 4;
    return base + nd * Math.sin(((beat - nStart) / (nEnd - nStart)) * Math.PI);
  } else if (beat < 0.92) {
    const postNotch = p.DBP + (p.SBP - p.DBP) * 0.42;
    const t = (beat - nEnd) / (0.92 - nEnd);
    return (postNotch - p.DBP) * Math.exp(-(p.decayRate || 2.5) * t) + p.DBP;
  }
  return p.DBP;
}

// Spike-and-dome aortic waveform for HOCM
function generateAoHOCM(beat, p) {
  const spikeEnd = 0.07;    // Initial rapid spike
  const dipCenter = 0.14;   // Mid-systolic dip (SAM-septal contact)
  const domeEnd = 0.30;     // Late systolic dome
  const dipDepth = p.dipDepth || 0.35; // fraction of spike height lost at dip

  if (beat < spikeEnd) {
    // Rapid initial upstroke (spike) — before SAM causes obstruction
    const t = beat / spikeEnd;
    return p.DBP + t * (p.SBP - p.DBP);
  } else if (beat < 0.10) {
    // Brief plateau at spike peak
    return p.SBP;
  } else if (beat < 0.18) {
    // Mid-systolic dip — SAM contacts septum
    const t = (beat - 0.10) / 0.08;
    const dipVal = p.SBP - (p.SBP - p.DBP) * dipDepth;
    const dip = dipVal + (p.SBP - dipVal) * 4 * t * (1 - t) * (-0.3); // parabolic dip
    // Use smooth sine dip
    return p.SBP - (p.SBP - dipVal) * Math.sin(t * Math.PI);
  } else if (beat < domeEnd) {
    // Late systolic dome — partial recovery
    const t = (beat - 0.18) / (domeEnd - 0.18);
    const dipVal = p.SBP - (p.SBP - p.DBP) * dipDepth;
    const domeHeight = dipVal + (p.SBP - dipVal) * 0.6; // dome doesn't reach full spike
    return domeHeight - t * (domeHeight - (p.DBP + (p.SBP - p.DBP) * 0.3));
  } else if (beat < 0.36) {
    // Dicrotic region (minimal notch in HOCM)
    const base = p.DBP + (p.SBP - p.DBP) * 0.28;
    return base;
  } else if (beat < 0.90) {
    // Diastolic decay
    const postSys = p.DBP + (p.SBP - p.DBP) * 0.28;
    const t = (beat - 0.36) / (0.90 - 0.36);
    return (postSys - p.DBP) * Math.exp(-2.5 * t) + p.DBP;
  }
  return p.DBP;
}

// LV with intraventricular gradient for HOCM
function generateLVHOCM(beat, p) {
  const baseP = generateLV(beat, p);
  // Add mid-systolic pressure bump from dynamic obstruction
  if (beat > 0.08 && beat < 0.28) {
    const t = (beat - 0.08) / 0.20;
    const gradientBump = (p.gradient || 30) * Math.sin(t * Math.PI) * 0.6;
    return baseP + gradientBump;
  }
  return baseP;
}

function generateECG(beat, p) {
  let v = 0;
  const hr = p.HR || 72;
  const isPVC = p.isPVC;
  if (isPVC) {
    // PVC: no P wave, wide bizarre QRS, discordant T
    v -= 0.10 * gauss(beat, 0.03, 0.010);
    v += 0.60 * gauss(beat, 0.05, 0.018);
    v -= 0.90 * gauss(beat, 0.08, 0.016);
    v += 0.15 * gauss(beat, 0.10, 0.012);
    v += 0.35 * gauss(beat, 0.18, 0.040);
    return v;
  }
  // P wave — placed at 0.88 (end of previous cycle) for proper PR interval
  // Wrap-around Gaussian: compute shortest distance accounting for beat boundary
  const pCenter = 0.88;
  const pDist = Math.min(Math.abs(beat - pCenter), Math.abs(beat - pCenter + 1), Math.abs(beat - pCenter - 1));
  v += 0.22 * Math.exp(-0.5 * Math.pow(pDist / 0.022, 2));
  // QRS
  v -= 0.06 * gauss(beat, 0.065, 0.005); // Q
  v += 1.0 * gauss(beat, 0.072, 0.008);  // R
  v -= 0.18 * gauss(beat, 0.085, 0.007); // S
  // T wave — asymmetric, center shifts with HR (Bazett-like)
  const rrSec = 60 / hr;
  const qtFrac = 0.38 * Math.sqrt(rrSec) / rrSec;
  const tCenter = 0.072 + qtFrac * 0.7;
  v += 0.25 * gauss(beat, Math.min(tCenter, 0.42), 0.035);
  return v;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpObj(a, b, t) {
  const r = {};
  for (const k of Object.keys(a)) {
    if (typeof a[k] === 'number' && typeof b[k] === 'number') r[k] = lerp(a[k], b[k], t);
    else r[k] = t > 0.5 ? b[k] : a[k];
  }
  for (const k of Object.keys(b)) { if (!(k in r)) r[k] = b[k]; }
  return r;
}

function getSeverityT() {
  return severity / 100;
}

function getASParams() {
  const t = getSeverityT();
  let ao, lv;
  if (t < 0.33) {
    const s = t / 0.33;
    ao = lerpObj(NORMAL_PARAMS.ao, AS_MILD, s);
    lv = lerpObj(NORMAL_PARAMS.lv, AS_LV_MILD, s);
  } else if (t < 0.66) {
    const s = (t - 0.33) / 0.33;
    ao = lerpObj(AS_MILD, AS_MOD, s);
    lv = lerpObj(AS_LV_MILD, AS_LV_MOD, s);
  } else {
    const s = (t - 0.66) / 0.34;
    ao = lerpObj(AS_MOD, AS_SEVERE, s);
    lv = lerpObj(AS_LV_MOD, AS_LV_SEVERE, s);
  }
  return { ao, lv };
}

function getMSParams() {
  const t = getSeverityT();
  let pcwp;
  if (t < 0.33) {
    pcwp = lerpObj(NORMAL_PARAMS.pcwp, MS_MILD_PCWP, t / 0.33);
  } else if (t < 0.66) {
    pcwp = lerpObj(MS_MILD_PCWP, MS_MOD_PCWP, (t - 0.33) / 0.33);
  } else {
    pcwp = lerpObj(MS_MOD_PCWP, MS_SEVERE_PCWP, (t - 0.66) / 0.34);
  }
  return { pcwp, lv: NORMAL_PARAMS.lv };
}

let mrAcute = true; // toggle for acute vs chronic MR

function getMRParams() {
  const t = getSeverityT();
  let pcwp;
  if (mrAcute) {
    if (t < 0.33) pcwp = lerpObj(NORMAL_PARAMS.pcwp, MR_MILD_PCWP, t / 0.33);
    else if (t < 0.66) pcwp = lerpObj(MR_MILD_PCWP, MR_MOD_PCWP, (t - 0.33) / 0.33);
    else pcwp = lerpObj(MR_MOD_PCWP, MR_SEV_PCWP, (t - 0.66) / 0.34);
  } else {
    // Chronic: V waves less dramatic
    if (t < 0.5) pcwp = lerpObj(NORMAL_PARAMS.pcwp, MR_CHRONIC_PCWP, t / 0.5);
    else pcwp = lerpObj(MR_CHRONIC_PCWP, MR_MOD_PCWP, (t - 0.5) / 0.5);
  }
  return { pcwp, lv: NORMAL_PARAMS.lv };
}

function getARParams() {
  const t = getSeverityT();
  let ao, lv;
  if (t < 0.33) {
    ao = lerpObj(NORMAL_PARAMS.ao, AR_MILD_AO, t / 0.33);
    lv = lerpObj(NORMAL_PARAMS.lv, AR_MILD_LV, t / 0.33);
  } else if (t < 0.66) {
    ao = lerpObj(AR_MILD_AO, AR_MOD_AO, (t - 0.33) / 0.33);
    lv = lerpObj(AR_MILD_LV, AR_MOD_LV, (t - 0.33) / 0.33);
  } else {
    ao = lerpObj(AR_MOD_AO, AR_SEV_AO, (t - 0.66) / 0.34);
    lv = lerpObj(AR_MOD_LV, AR_SEV_LV, (t - 0.66) / 0.34);
  }
  return { ao, lv };
}

function getTRParams() {
  const t = getSeverityT();
  let ra;
  if (t < 0.33) ra = lerpObj(NORMAL_PARAMS.ra, TR_MILD_RA, t / 0.33);
  else if (t < 0.66) ra = lerpObj(TR_MILD_RA, TR_MOD_RA, (t - 0.33) / 0.33);
  else ra = lerpObj(TR_MOD_RA, TR_SEV_RA, (t - 0.66) / 0.34);
  return { ra, rv: NORMAL_PARAMS.rv };
}

// Get RA or PCWP params for the current lesson (used by annotation rendering)
function getAnnotationParams(traceId) {
  const lesson = currentLesson;
  if (traceId === 'ra') {
    if (lesson === 'tr') return getTRParams().ra;
    if (lesson === 'cp') return CP_PARAMS.ra;
    if (lesson === 'rcm') return RCM_PARAMS.ra;
    if (lesson === 'tamp') return TAMP_PARAMS.ra;
    if (lesson === 'ph') return getPHParams().ra;
    return NORMAL_PARAMS.ra;
  }
  if (traceId === 'pcwp') {
    if (lesson === 'mr') return getMRParams().pcwp;
    if (lesson === 'ms') return getMSParams().pcwp;
    if (lesson === 'ph') return getPHParams().pcwp;
    return NORMAL_PARAMS.pcwp;
  }
  return null;
}

function getHOCMParams() {
  let t = getSeverityT();
  // Provocation shifts effective severity
  t = Math.max(0, Math.min(1, t + hocmProvocation * 0.3));
  let ao, lv;
  if (t < 0.33) {
    ao = lerpObj(HOCM_MILD_AO, HOCM_MILD_AO, 0);
    lv = lerpObj(HOCM_MILD_LV, HOCM_MILD_LV, 0);
    const s = t / 0.33;
    ao = lerpObj({ SBP: 125, DBP: 78, dipDepth: 0.05 }, HOCM_MILD_AO, s);
    lv = lerpObj({ LVSP: 130, LVEDP: 12, aAmp: 3, upRate: 1, diaMin: 2, gradient: 15 }, HOCM_MILD_LV, s);
  } else if (t < 0.66) {
    const s = (t - 0.33) / 0.33;
    ao = lerpObj(HOCM_MILD_AO, HOCM_MOD_AO, s);
    lv = lerpObj(HOCM_MILD_LV, HOCM_MOD_LV, s);
  } else {
    const s = (t - 0.66) / 0.34;
    ao = lerpObj(HOCM_MOD_AO, HOCM_SEV_AO, s);
    lv = lerpObj(HOCM_MOD_LV, HOCM_SEV_LV, s);
  }
  return { ao, lv };
}

// Dip-and-plateau ventricular generator (square-root sign)
function generateVent_DipPlateau(beat, p) {
  const uEnd = p.upEnd || 0.05;
  const peakT = 0.09;
  const ejectEnd = 0.27;
  const ivrEnd = 0.34;
  const dipEnd = p.dipEnd || 0.42;
  const plateauEnd = p.plateauEnd || 0.88;
  const aWave = (p.aAmp || 3) * gauss(beat, 0.92, 0.03);
  const ejectDrop = p.SP * 0.06;
  const dipTarget = p.dipMin != null ? p.dipMin : p.EDP * 0.3;
  const plateau = p.EDP;

  if (beat < uEnd) {
    return plateau + aWave + Math.pow(beat / uEnd, 1 / (p.upRate || 1)) * (p.SP - plateau);
  } else if (beat < peakT) {
    return p.SP - ejectDrop * 0.15 * (1 - Math.cos((beat - uEnd) / (peakT - uEnd) * Math.PI)) / 2;
  } else if (beat < ejectEnd) {
    const t = (beat - peakT) / (ejectEnd - peakT);
    return p.SP - ejectDrop * 0.15 - ejectDrop * 0.85 * t;
  } else if (beat < ivrEnd) {
    const t = (beat - ejectEnd) / (ivrEnd - ejectEnd);
    const start = p.SP - ejectDrop;
    return start - (start - dipTarget) * (1 - Math.pow(1 - t, 2));
  } else if (beat < dipEnd) {
    // THE DIP: rapid early diastolic filling → sharp nadir, then square-root rise
    const t = (beat - ivrEnd) / (dipEnd - ivrEnd);
    return dipTarget + (plateau - dipTarget) * Math.pow(t, 0.5);
  } else {
    // THE PLATEAU: filling halted by rigid pericardium/stiff myocardium
    return plateau + aWave;
  }
}

// Apply respiratory modulation to systolic pressure
// If respPhaseVal is provided, use it; otherwise use current global respPhase
function applyRespMod(baseP, respAmp, respPhaseVal) {
  if (!respEnabled) return baseP;
  const mod = Math.sin(respPhaseVal != null ? respPhaseVal : respPhase);
  return baseP + respAmp * (-mod);
}

// ── Waveform pixel buffer (strip-chart model) ──
// For respiratory lessons: each pixel is generated ONCE at the leading edge
// and frozen. The render loop reads from the buffer, not from gen().
// This ensures past data never changes when respPhase evolves.
const waveBuffer = new Map(); // worldX (int) → { traceId: mmHg, ... }
let bufferHead = -1;
let bufferActive = false;

function clearWaveBuffer() {
  waveBuffer.clear();
  bufferHead = -1;
  bufferActive = false;
}

// Snapshot the entire visible canvas into the buffer (called when resp toggled ON).
// This freezes all currently-visible pixels so they won't shift when respPhase changes.
function prefillWaveBuffer() {
  const lesson = LESSONS[currentLesson];
  const traces = typeof lesson.traces === 'function' ? lesson.traces() : lesson.traces;
  const scrollDPR = getScrollDPR();
  const w = waveCanvas.width;
  const beatDuration = 60 / HR;
  const pxPerSec = speed * 3.78 * DPR;
  const pxPerBeat = beatDuration * pxPerSec;

  for (let px = 0; px < w; px++) {
    const wx = Math.round(px + scrollDPR);
    if (waveBuffer.has(wx)) continue;
    const beatFrac = ((wx / pxPerBeat) % 1 + 1) % 1;
    const entry = {};
    traces.forEach(tr => { entry[tr.id] = tr.gen(beatFrac); });
    // Store ECG value too (normal — no PVC for prefilled/past data)
    entry._ecg = generateECG(beatFrac, { HR });
    waveBuffer.set(wx, entry);
  }
  bufferHead = Math.round(w - 1 + scrollDPR);
  bufferActive = true;
}

// Generate new pixels at the leading edge (called each frame from animation loop).
function advanceWaveBuffer() {
  if (!bufferActive) return;
  const scrollDPR = getScrollDPR();
  const w = waveCanvas.width;
  const newHead = Math.round(scrollDPR + w - 1);
  if (newHead <= bufferHead) return;

  const lesson = LESSONS[currentLesson];
  const traces = typeof lesson.traces === 'function' ? lesson.traces() : lesson.traces;
  const beatDuration = 60 / HR;
  const pxPerSec = speed * 3.78 * DPR;
  const pxPerBeat = beatDuration * pxPerSec;

  for (let wx = bufferHead + 1; wx <= newHead; wx++) {
    const beatFrac = ((wx / pxPerBeat) % 1 + 1) % 1;
    const entry = {};
    traces.forEach(tr => { entry[tr.id] = tr.gen(beatFrac); });
    // Store ECG with current PVC state (leading edge = real-time state)
    const isPVC = pvcState === 'pvc' || pvcState === 'pause';
    entry._ecg = generateECG(beatFrac, { HR, isPVC });
    waveBuffer.set(wx, entry);
  }
  bufferHead = newHead;

  // Prune: keep 2x canvas width behind
  const minKeep = Math.round(scrollDPR) - w;
  for (const k of waveBuffer.keys()) {
    if (k < minKeep) waveBuffer.delete(k);
  }
}

            <li>PVR = TPG / CO = ${TPG} / ${CO} = <strong>${PVR} WU</strong> ${parseFloat(PVR) > 2 ? '<span style="color:#ff5252">(>2 WU)</span>' : '(≤2 WU)'}</li>
            <li>PAPi = PP / RAP = ${p.pa.PASP - p.pa.PADP} / ${p.ra.mean} = <strong>${PAPi}</strong> ${parseFloat(PAPi) < 0.9 ? '<span style="color:#ff5252">(<0.9 — RV failure risk)</span>' : '(>0.9)'}</li>
            <li>PA compliance = SV / PP ≈ <strong>${PAC} mL/mmHg</strong></li>
          </ul>
          <div class="tp-body">
            <p><strong>2022 ESC/ERS Updated Criteria:</strong></p>
            <p>PH defined as <strong>mPAP >20 mmHg</strong> (revised from >25)</p>
            <p style="margin-top:6px"><strong>Classification:</strong></p>
            <table style="font-size:10.5px;border-collapse:collapse;width:100%;margin-top:4px">
              <tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:2px 6px">Type</th><th style="padding:2px 6px">PCWP</th><th style="padding:2px 6px">PVR</th></tr>
              <tr ${phType === 'pre' ? 'style="color:var(--accent);font-weight:bold"' : ''}><td style="padding:2px 6px">Pre-capillary</td><td style="padding:2px 6px;text-align:center">≤15</td><td style="padding:2px 6px;text-align:center">>2 WU</td></tr>
              <tr ${phType === 'post' ? 'style="color:var(--accent);font-weight:bold"' : ''}><td style="padding:2px 6px">Post-cap (isolated)</td><td style="padding:2px 6px;text-align:center">>15</td><td style="padding:2px 6px;text-align:center">≤2 WU</td></tr>
              <tr ${phType === 'combined' ? 'style="color:var(--accent);font-weight:bold"' : ''}><td style="padding:2px 6px">Combined</td><td style="padding:2px 6px;text-align:center">>15</td><td style="padding:2px 6px;text-align:center">>2 WU</td></tr>
            </table>
            <p style="margin-top:8px"><strong>Acute vs Chronic RV:</strong> RV cannot acutely generate PASP >50 mmHg. PASP >50 = subacute/chronic remodeling.</p>
            <p style="margin-top:6px"><strong>PCWP pitfall:</strong> hybrid PA-PCWP tracing common in severe PH. PCWP underestimates LVEDP in >50% of PH — always measure LVEDP directly.</p>

        </div>
        <div class="tp-body" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">

            <li><strong>Exercise PH:</strong> mPAP/CO slope >3 mmHg/L/min during exercise (emerging concept)</li>
            <li><strong>RV-PA coupling:</strong> Ees/Ea ratio; uncoupling = RV failure despite stable pressures</li>
            <li><strong>REVEAL 2.0 risk score:</strong> WHO FC, 6MWD, BNP, renal function, hemodynamics → 1-year mortality</li>
            <li><strong>Volume loading test:</strong> 500mL saline → PCWP >18 suggests occult Group 2 (HFpEF)</li>
          </ul>
        </div>`;
    }
  },
  eq: {

// EQUATIONS PANEL BUILDER

function buildEquationsPanel() {
  return `
    <div class="eq-header">
      <h2>Hemodynamic Equations & Calculations</h2>
      <p>Quick-reference formulas for the cath lab. For full calculations with report generation, use the <a href="/rhc/" target="_blank">RHC Calculator</a>.</p>
    </div>
    <div class="eq-grid">

      <!-- FICK CARDIAC OUTPUT -->
      <div class="eq-card">
        <h3>Fick Cardiac Output</h3>
        <div class="eq-formula">
          CO <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num"><span class="eq-var">VO₂</span></span>
            <span class="frac-den">(<span class="eq-var">CaO₂</span> <span class="eq-sym">−</span> <span class="eq-var">CvO₂</span>) <span class="eq-sym">×</span> <span class="eq-const">10</span></span>
          </span>
        </div>
        <div class="eq-explain">
          <strong>"Oxygen consumed ÷ oxygen extracted per pass."</strong><br>
          <strong>Numerator</strong> = total O₂ consumption (mL/min). Assumed = 125 × BSA, or directly measured.<br>
          <strong>Denominator</strong> = arteriovenous O₂ difference per liter of blood.<br>
          CaO₂ = 1.36 × Hb × SaO₂/100 &nbsp; | &nbsp; CvO₂ = 1.36 × Hb × SvO₂/100<br>
          <span class="eq-tip">The ×10 converts dL→L. SvO₂ = PA sat (true mixed venous).</span>
        </div>
        <div class="eq-mini-calc">
          <div class="mc-title">Quick Calculator</div>
          <div class="mc-row">
            <label>Hb (g/dL)</label><input type="number" id="eqFickHb" value="14" step="0.1" oninput="calcFick()">
            <label>BSA (m²)</label><input type="number" id="eqFickBSA" value="1.9" step="0.1" oninput="calcFick()">
          </div>
          <div class="mc-row">
            <label>SaO₂ (%)</label><input type="number" id="eqFickSaO2" value="98" step="1" oninput="calcFick()">
            <label>SvO₂ (%)</label><input type="number" id="eqFickSvO2" value="65" step="1" oninput="calcFick()">
          </div>
          <div class="mc-result" id="eqFickResult">CO = — &nbsp; CI = —</div>
        </div>
        <div class="eq-interp">
          <strong>Normal:</strong> <span class="eq-norm">CO 4–8 L/min, CI 2.5–4.2 L/min/m²</span><br>

        </div>
      </div>

      <!-- Qp/Qs SHUNT -->
      <div class="eq-card">
        <h3>Qp/Qs — Shunt Calculation</h3>

          <span class="frac">
            <span class="frac-num"><span class="eq-var">SaO₂</span> <span class="eq-sym">−</span> <span class="eq-var">SvO₂</span></span>

          </span>
        </div>
        <div class="eq-explain">
          <strong>"Body spends, lungs reload."</strong><br>
          <strong>Numerator</strong> = body spend (aorta − mixed venous). How much O₂ the body extracts per pass.<br>
          <strong>Denominator</strong> = lung reload (pulmonary vein − PA). How much O₂ the lungs add per pass.<br>
          <span class="eq-tip">SpvO₂ ≈ SaO₂ if no R→L shunt (use 98% if not measured). SvO₂ = Flamm: (3×SVC + IVC)/4.</span>
        </div>
        <div class="eq-mini-calc">
          <div class="mc-title">Quick Calculator</div>
          <div class="mc-row">
            <label>SaO₂ (%)</label><input type="number" id="eqQpSaO2" value="98" step="1" oninput="calcQpQs()">
            <label>SvO₂ (%)</label><input type="number" id="eqQpSvO2" value="65" step="1" oninput="calcQpQs()">
          </div>
          <div class="mc-row">
            <label>SpvO₂ (%)</label><input type="number" id="eqQpSpvO2" value="98" step="1" oninput="calcQpQs()">
            <label>SpaO₂ (%)</label><input type="number" id="eqQpSpaO2" value="75" step="1" oninput="calcQpQs()">
          </div>
          <div class="mc-result" id="eqQpQsResult">Qp/Qs = —</div>
        </div>
        <div class="eq-interp">
          Qp:Qs <strong>1.0</strong> = no shunt &nbsp;|&nbsp; <strong class="eq-warn">>1.5</strong> = significant L→R (consider closure) &nbsp;|&nbsp; <strong class="eq-alert">&lt;1.0</strong> = R→L shunt<br>
          <strong>Step-up localization:</strong> >7% at atrial level, >5% at ventricular, >5% at PA.<br>

      </div>

      <!-- GORLIN VALVE AREA -->
      <div class="eq-card">
        <h3>Gorlin — Valve Area</h3>
        <div class="eq-formula">
          AVA <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num"><span class="eq-var">CO</span></span>
            <span class="frac-den"><span class="eq-const">44.3</span> <span class="eq-sym">×</span> <span class="eq-var">HR</span> <span class="eq-sym">×</span> <span class="eq-var">SEP</span> <span class="eq-sym">×</span> √<span class="eq-var">ΔP</span></span>
          </span>
        </div>
        <div class="eq-explain">
          <strong>"Flow across the valve ÷ how hard it has to push."</strong><br>
          <strong>Numerator</strong> = cardiac output (mL/min).<br>
          <strong>Denominator</strong> = flow rate × hydraulic resistance. SEP = systolic ejection period (seconds/beat).<br>
          For <strong>MVA</strong>: use constant <strong>37.7</strong> and <strong>DFP</strong> (diastolic filling period) instead of SEP.<br>
          <span class="eq-tip">Hakki shortcut: AVA ≈ CO / √ΔP<sub>peak</sub> (only valid HR 60–100).</span>

          <div class="mc-title">Quick Calculator</div>

          <div class="mc-row">

          </div>
          <div class="mc-result" id="eqGorlinResult">AVA = —</div>
        </div>
        <div class="eq-interp">
          <strong>Severe AS:</strong> <span class="eq-alert">AVA &lt;1.0 cm²</span> &nbsp;|&nbsp; <strong>Severe MS:</strong> <span class="eq-alert">MVA &lt;1.5 cm²</span><br>
          Gorlin underestimates area in low-flow states. Use dobutamine stress echo to confirm.
        </div>
      </div>

      <!-- SVR / PVR -->
      <div class="eq-card">
        <h3>Vascular Resistance</h3>
        <div class="eq-formula">
          SVR <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num">(<span class="eq-var">MAP</span> <span class="eq-sym">−</span> <span class="eq-var">RAP</span>) <span class="eq-sym">×</span> <span class="eq-const">80</span></span>
            <span class="frac-den"><span class="eq-var">CO</span></span>
          </span>
        </div>
        <div class="eq-formula" style="margin-top:6px">
          PVR <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num">(<span class="eq-var">mPAP</span> <span class="eq-sym">−</span> <span class="eq-var">PCWP</span>) <span class="eq-sym">×</span> <span class="eq-const">80</span></span>

          </span>
        </div>

          <strong>"Pressure drop across the bed ÷ flow."</strong> Ohm's law for blood.<br>
          <strong>SVR</strong> = systemic afterload (LV pushes against). <strong>PVR</strong> = pulmonary afterload (RV pushes against).<br>
          ×80 converts Wood units → dynes·s·cm⁻⁵. <strong>Omit ×80 for Wood units.</strong><br>
          <span class="eq-tip">TPG = mPAP − PCWP (>12 = pre-cap component). DPG = PADP − PCWP (≥7 = pre-cap).</span>
        </div>
        <div class="eq-mini-calc">
          <div class="mc-title">Quick Calculator</div>
          <div class="mc-row">
            <label>MAP</label><input type="number" id="eqResMAP" value="90" step="1" oninput="calcResistance()">
            <label>RAP</label><input type="number" id="eqResRAP" value="5" step="1" oninput="calcResistance()">
            <label>CO</label><input type="number" id="eqResCO" value="5.0" step="0.1" oninput="calcResistance()">
          </div>
          <div class="mc-row">
            <label>mPAP</label><input type="number" id="eqResPAP" value="15" step="1" oninput="calcResistance()">
            <label>PCWP</label><input type="number" id="eqResPCWP" value="10" step="1" oninput="calcResistance()">
          </div>
          <div class="mc-result" id="eqResResult">SVR = — &nbsp; PVR = —</div>
        </div>
        <div class="eq-interp">
          <strong>SVR normal:</strong> <span class="eq-norm">800–1200 dynes</span> (10–15 WU) &nbsp;|&nbsp; <strong>PVR normal:</strong> <span class="eq-norm">&lt;240 dynes</span> (&lt;3 WU)<br>

        </div>
      </div>

      <!-- AR INDEX -->

        <h3>Aortic Regurgitation Index</h3>

          ARI <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num"><span class="eq-var">AoDBP</span> <span class="eq-sym">−</span> <span class="eq-var">LVEDP</span></span>
            <span class="frac-den"><span class="eq-var">AoSBP</span></span>
          </span>
        </div>
        <div class="eq-explain">
          <strong>"How much diastolic driving gradient remains."</strong><br>
          In severe AR, LVEDP rises toward AoDBP, shrinking the gradient that drives coronary perfusion.<br>
          The index normalizes this to systolic pressure.<br>
          <span class="eq-tip">Measured at end-diastole. A low ARI predicts need for surgery.</span>
        </div>
        <div class="eq-mini-calc">
          <div class="mc-title">Quick Calculator</div>
          <div class="mc-row">
            <label>AoDBP</label><input type="number" id="eqARIdbp" value="60" step="1" oninput="calcARI()">

            <label>AoSBP</label><input type="number" id="eqARIsbp" value="140" step="1" oninput="calcARI()">
          </div>
          <div class="mc-result" id="eqARIResult">ARI = —</div>
        </div>
        <div class="eq-interp">
          ARI <strong class="eq-norm">>0.25</strong> = mild–moderate &nbsp;|&nbsp; <strong class="eq-alert">≤0.25</strong> = severe AR (surgery indicated)<br>
          Correlates with angiographic grade. Low ARI = equalization → impaired coronary flow.
        </div>
      </div>

      <!-- OTHER HIGH-YIELD -->
      <div class="eq-card">
        <h3>Other High-Yield Formulas</h3>
        <div class="eq-formula" style="font-size:13px; text-align:left; line-height: 2.2;">
          <strong>SAI</strong> <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num">RV<sub>insp</sub> / LV<sub>insp</sub></span>
            <span class="frac-den">RV<sub>exp</sub> / LV<sub>exp</sub></span>
          </span>
          <span style="color:var(--text-dim); margin-left:8px; font-size:11px">(>1.1 = CP, sens 97%)</span><br>
          <strong>PAPi</strong> <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num">PASP <span class="eq-sym">−</span> PADP</span>
            <span class="frac-den">RAP</span>
          </span>
          <span style="color:var(--text-dim); margin-left:8px; font-size:11px">(&lt;0.9 predicts RV failure)</span><br>
          <strong>DPG</strong> <span class="eq-sym">=</span> PADP − PCWP
          <span style="color:var(--text-dim); margin-left:8px; font-size:11px">(≥7 = pre-cap PH component)</span><br>
          <strong>MAP</strong> <span class="eq-sym">=</span> DBP + ⅓(SBP − DBP)<br>
          <strong>QTc</strong> <span class="eq-sym">=</span>
          <span class="frac">
            <span class="frac-num">QT</span>
            <span class="frac-den">√RR</span>
          </span>

          <strong>LVEDP grading:</strong> normal &lt;12, borderline 12–16, elevated 16–20, severely elevated >20 mmHg.<br>
          <strong>Damping coefficient:</strong> overshoot / (SBP − DBP). Optimal 0.6–0.7 → adequate frequency response.<br>
          <strong>PA compliance:</strong> SV / (PASP − PADP). Low compliance = poor RV-PA coupling, worse prognosis in PH.
        </div>
      </div>

    </div>`;
}

// ── Equation mini-calculators ────────────────────────────────────

function calcFick() {
  const hb = parseFloat(document.getElementById('eqFickHb').value) || 0;
  const bsa = parseFloat(document.getElementById('eqFickBSA').value) || 0;
  const saO2 = parseFloat(document.getElementById('eqFickSaO2').value) || 0;
  const svO2 = parseFloat(document.getElementById('eqFickSvO2').value) || 0;
  const vo2 = 125 * bsa;
  const caO2 = 1.36 * hb * saO2 / 100;
  const cvO2 = 1.36 * hb * svO2 / 100;
  const avDiff = caO2 - cvO2;
  if (avDiff <= 0 || bsa <= 0) { document.getElementById('eqFickResult').innerHTML = 'CO = — &nbsp; CI = —'; return; }
  const co = vo2 / (avDiff * 10);
  const ci = co / bsa;
  let cls = ci >= 2.5 ? 'eq-norm' : ci >= 2.2 ? 'eq-warn' : 'eq-alert';
  document.getElementById('eqFickResult').innerHTML =
    `CO = <strong>${co.toFixed(1)}</strong> L/min &nbsp;|&nbsp; CI = <strong class="${cls}">${ci.toFixed(1)}</strong> L/min/m² &nbsp;<span style="font-size:10px;color:var(--text-dim)">(VO₂ assumed ${Math.round(vo2)})</span>`;
}

function calcQpQs() {
  const saO2 = parseFloat(document.getElementById('eqQpSaO2').value) || 0;
  const svO2 = parseFloat(document.getElementById('eqQpSvO2').value) || 0;
  const spvO2 = parseFloat(document.getElementById('eqQpSpvO2').value) || 0;
  const spaO2 = parseFloat(document.getElementById('eqQpSpaO2').value) || 0;
  const den = spvO2 - spaO2;
  if (den <= 0) { document.getElementById('eqQpQsResult').innerHTML = 'Qp/Qs = —'; return; }
  const ratio = (saO2 - svO2) / den;
  let interp, cls;
  if (ratio > 1.5) { interp = 'Significant L→R shunt'; cls = 'eq-alert'; }
  else if (ratio > 1.1) { interp = 'Small L→R shunt'; cls = 'eq-warn'; }
  else if (ratio >= 0.9) { interp = 'No significant shunt'; cls = 'eq-norm'; }
  else { interp = 'R→L shunt'; cls = 'eq-alert'; }
  document.getElementById('eqQpQsResult').innerHTML =
    `Qp/Qs = <strong>${ratio.toFixed(2)}</strong> &nbsp;<span class="${cls}" style="font-size:11px">${interp}</span>`;
}

function calcGorlin() {
  const co = (parseFloat(document.getElementById('eqGorCO').value) || 0) * 1000; // mL/min
  const hr = parseFloat(document.getElementById('eqGorHR').value) || 0;
  const sep = parseFloat(document.getElementById('eqGorSEP').value) || 0;
  const grad = parseFloat(document.getElementById('eqGorGrad').value) || 0;
  if (hr <= 0 || sep <= 0 || grad <= 0) { document.getElementById('eqGorlinResult').innerHTML = 'AVA = —'; return; }
  const ava = co / (44.3 * hr * sep * Math.sqrt(grad));
  const hakki = (co / 1000) / Math.sqrt(grad);
  let cls = ava < 1.0 ? 'eq-alert' : ava < 1.5 ? 'eq-warn' : 'eq-norm';
  document.getElementById('eqGorlinResult').innerHTML =
    `AVA = <strong class="${cls}">${ava.toFixed(2)}</strong> cm² &nbsp;|&nbsp; Hakki = <strong>${hakki.toFixed(2)}</strong> cm²`;
}

function calcResistance() {
  const map = parseFloat(document.getElementById('eqResMAP').value) || 0;
  const rap = parseFloat(document.getElementById('eqResRAP').value) || 0;
  const co = parseFloat(document.getElementById('eqResCO').value) || 0;
  const mpap = parseFloat(document.getElementById('eqResPAP').value) || 0;
  const pcwp = parseFloat(document.getElementById('eqResPCWP').value) || 0;
  if (co <= 0) { document.getElementById('eqResResult').innerHTML = 'SVR = — &nbsp; PVR = —'; return; }
  const svr = ((map - rap) / co) * 80;
  const pvr = ((mpap - pcwp) / co) * 80;
  const svrWU = (map - rap) / co;
  const pvrWU = (mpap - pcwp) / co;
  let svrCls = svr >= 800 && svr <= 1200 ? 'eq-norm' : svr > 1200 ? 'eq-warn' : 'eq-alert';
  let pvrCls = pvr < 240 ? 'eq-norm' : 'eq-alert';
  document.getElementById('eqResResult').innerHTML =
    `SVR = <strong class="${svrCls}">${Math.round(svr)}</strong> dynes (${svrWU.toFixed(1)} WU) &nbsp;|&nbsp; PVR = <strong class="${pvrCls}">${Math.round(pvr)}</strong> dynes (${pvrWU.toFixed(1)} WU)`;
}

function calcARI() {
  const dbp = parseFloat(document.getElementById('eqARIdbp').value) || 0;
  const lvedp = parseFloat(document.getElementById('eqARIlvedp').value) || 0;
  const sbp = parseFloat(document.getElementById('eqARIsbp').value) || 0;
  if (sbp <= 0) { document.getElementById('eqARIResult').innerHTML = 'ARI = —'; return; }
  const ari = (dbp - lvedp) / sbp;
  let cls = ari > 0.25 ? 'eq-norm' : 'eq-alert';
  let interp = ari > 0.25 ? 'Mild–moderate AR' : 'Severe AR — surgery indicated';
  document.getElementById('eqARIResult').innerHTML =
    `ARI = <strong class="${cls}">${ari.toFixed(2)}</strong> &nbsp;<span class="${cls}" style="font-size:11px">${interp}</span>`;
}

function getGorlinCalcHTML() {
  return `
    <div class="calc-panel">
      <h4>Gorlin & Hakki AVA Calculator</h4>
      <div class="calc-row"><label>CO (L/min)</label><input type="number" id="calcCO" value="5.0" step="0.1" oninput="calcGorlinAVA()"></div>
      <div class="calc-row"><label>HR (bpm)</label><input type="number" id="calcHR" value="72" oninput="calcGorlinAVA()"></div>
      <div class="calc-row"><label>SEP (sec)</label><input type="number" id="calcSEP" value="0.32" step="0.01" oninput="calcGorlinAVA()"></div>
      <div class="calc-row"><label>Mean Grad</label><input type="number" id="calcGrad" value="45" step="1" oninput="calcGorlinAVA()"></div>
      <div class="calc-row"><label>Peak Grad</label><input type="number" id="calcPeak" value="70" step="1" oninput="calcGorlinAVA()"></div>
      <div class="calc-result" id="gorlinResult">AVA = —</div>
    </div>`;
}

function calcGorlinAVA() {
  const co = parseFloat(document.getElementById('calcCO')?.value) || 5;
  const hr = parseFloat(document.getElementById('calcHR')?.value) || 72;
  const sep = parseFloat(document.getElementById('calcSEP')?.value) || 0.32;
  const grad = parseFloat(document.getElementById('calcGrad')?.value) || 40;
  const peak = parseFloat(document.getElementById('calcPeak')?.value) || 70;

  const coMl = co * 1000;
  const gorlin = coMl / (44.3 * hr * sep * Math.sqrt(grad));
  const hakki = co / Math.sqrt(peak);

  let sev = '', cls = '';
  if (gorlin < 0.6) { sev = 'Critical'; cls = 'sev-crit'; }
  else if (gorlin < 1.0) { sev = 'Severe'; cls = 'sev-sev'; }
  else if (gorlin < 1.5) { sev = 'Moderate'; cls = 'sev-mod'; }
  else { sev = 'Mild'; cls = 'sev-mild'; }

  const el = document.getElementById('gorlinResult');
  if (el) el.innerHTML = `Gorlin AVA = <span class="val">${gorlin.toFixed(2)} cm²</span> <span class="sev ${cls}">${sev}</span> &nbsp;|&nbsp; Hakki AVA = <span class="val">${hakki.toFixed(2)} cm²</span>`;
}

function getGorlinMVACalcHTML() {
  return `
    <div class="calc-panel">
      <h4>Gorlin MVA Calculator</h4>
      <div class="calc-row"><label>CO (L/min)</label><input type="number" id="calcMCO" value="5.0" step="0.1" oninput="calcGorlinMVA()"></div>
      <div class="calc-row"><label>HR (bpm)</label><input type="number" id="calcMHR" value="72" oninput="calcGorlinMVA()"></div>
      <div class="calc-row"><label>DFP (sec)</label><input type="number" id="calcDFP" value="0.42" step="0.01" oninput="calcGorlinMVA()"></div>
      <div class="calc-row"><label>Mean Grad</label><input type="number" id="calcMGrad" value="12" step="1" oninput="calcGorlinMVA()"></div>
      <div class="calc-result" id="gorlinMVAResult">MVA = —</div>
    </div>`;
}

function calcGorlinMVA() {
  const co = parseFloat(document.getElementById('calcMCO')?.value) || 5;
  const hr = parseFloat(document.getElementById('calcMHR')?.value) || 72;
  const dfp = parseFloat(document.getElementById('calcDFP')?.value) || 0.42;
  const grad = parseFloat(document.getElementById('calcMGrad')?.value) || 12;

  const coMl = co * 1000;
  const mva = coMl / (37.7 * hr * dfp * Math.sqrt(grad));

  let sev = '', cls = '';
  if (mva < 1.0) { sev = 'Severe'; cls = 'sev-sev'; }
  else if (mva < 1.5) { sev = 'Moderate'; cls = 'sev-mod'; }
  else { sev = 'Mild'; cls = 'sev-mild'; }

  const el = document.getElementById('gorlinMVAResult');
  if (el) el.innerHTML = `Gorlin MVA = <span class="val">${mva.toFixed(2)} cm²</span> <span class="sev ${cls}">${sev}</span>`;
}

function switchLesson(id) {
  if (!LESSONS[id]) return;
  currentLesson = id;
  const lesson = LESSONS[id];

  // Update sidebar
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.lesson-btn[data-lesson="${id}"]`);
  if (btn) btn.classList.add('active');

  // Controls
  document.getElementById('severityGroup').style.display = lesson.hasSeverity ? '' : 'none';
  document.getElementById('compareGroup').style.display = lesson.hasCompare ? '' : 'none';
  document.getElementById('acuteGroup').style.display = lesson.hasAcuteToggle ? '' : 'none';
  document.getElementById('pvcGroup').style.display = lesson.hasProvocation ? '' : 'none';
  document.getElementById('provocationGroup').style.display = lesson.hasProvocation ? '' : 'none';
  document.getElementById('phTypeGroup').style.display = lesson.hasPHType ? '' : 'none';
  document.getElementById('respGroup').style.display = lesson.hasResp ? '' : 'none';
  // Reset PH type on lesson switch
  phType = 'pre';
  document.getElementById('phPreBtn').classList.add('on');
  document.getElementById('phPostBtn').classList.remove('on');
  document.getElementById('phCombBtn').classList.remove('on');
  // Reset respiratory state on lesson switch
  respEnabled = false;
  respPhase = 0;
  clearWaveBuffer();
  const respBtn = document.getElementById('respBtn');
  if (respBtn) { respBtn.textContent = 'Respiration'; respBtn.classList.remove('on'); }
  // Reset PVC state on lesson switch
  pvcState = 'none';
  pvcBeatCountdown = 0;
  hocmProvocation = 0;
  const provSlider = document.getElementById('provSlider');
  if (provSlider) provSlider.value = 0;
  const provVal = document.getElementById('provVal');
  if (provVal) provVal.textContent = 'Baseline';
  const pvcBtn = document.getElementById('pvcBtn');
  if (pvcBtn) { pvcBtn.textContent = 'Trigger PVC'; pvcBtn.disabled = false; }

  // Equations panel: show/hide canvas vs formula grid
  const eqPanel = document.getElementById('equationsPanel');
  const controlsRow = document.querySelector('.controls-row');
  const teachingPanel = document.getElementById('teachingPanel');
  const resizeHandle = document.getElementById('resizeHandle');
  if (lesson.isEquations) {
    eqPanel.innerHTML = buildEquationsPanel();
    eqPanel.classList.add('active');
    document.getElementById('ecgCanvas').style.display = 'none';
    document.getElementById('waveCanvas').style.display = 'none';
    controlsRow.style.display = 'none';
    teachingPanel.style.display = 'none';
    resizeHandle.style.display = 'none';
    // Run initial calculations
    calcFick(); calcQpQs(); calcGorlin(); calcResistance(); calcARI();
  } else {
    eqPanel.classList.remove('active');
    eqPanel.innerHTML = '';
    document.getElementById('ecgCanvas').style.display = '';
    document.getElementById('waveCanvas').style.display = '';
    controlsRow.style.display = '';
    teachingPanel.style.display = '';
    resizeHandle.style.display = '';
  }

  // Build trace toggles
  rebuildTraceToggles();

  // Update teaching panel
  updateTeaching();

  // Reset scroll for clean look
  scrollX = 0;
  redrawNeeded = true;
}

function rebuildTraceToggles() {
  const lesson = LESSONS[currentLesson];
  const traces = typeof lesson.traces === 'function' ? lesson.traces() : lesson.traces;
  const container = document.getElementById('traceToggles');
  container.innerHTML = '';
  traceVis = {};

  traces.forEach(tr => {
    traceVis[tr.id] = (lesson.defaultOn || []).includes(tr.id);
    const btn = document.createElement('button');
    btn.className = 'trace-tog' + (traceVis[tr.id] ? ' on' : '');
    btn.textContent = tr.label;
    btn.style.color = getComputedColor(tr.color);
    btn.onclick = () => {
      traceVis[tr.id] = !traceVis[tr.id];
      btn.classList.toggle('on');
      redrawNeeded = true;
    };
    container.appendChild(btn);
  });
}

function getComputedColor(c) {
  if (!c.startsWith('var(')) return c;
  const prop = c.replace('var(','').replace(')','');
  return getComputedStyle(document.documentElement).getPropertyValue(prop).trim() || c;
}

function updateTeaching() {
  const lesson = LESSONS[currentLesson];
  teachingPanel.innerHTML = lesson.teaching();
  // Trigger calc if present
  if (currentLesson === 'as') setTimeout(calcGorlinAVA, 50);
  if (currentLesson === 'ms') setTimeout(calcGorlinMVA, 50);
}
