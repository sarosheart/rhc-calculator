// 1. PRESSURE-FLOW RELATIONSHIP -- two limbs (resting plateau + hyperemic line)
function drawPressureFlow(p, t) {
  ctx.clearRect(0, 0, W, H);
  const m = { l: 70, r: 60, top: 30, bot: 36 };
  const plotW = W - m.l - m.r, plotH = H - m.top - m.bot;
  // Axes
  ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(m.l, m.top);
  ctx.lineTo(m.l, m.top + plotH);
  ctx.lineTo(m.l + plotW, m.top + plotH);
  ctx.stroke();
  // x axis: Pressure (40-160 mmHg)
  const Pmin = 40, Pmax = 160;
  const xOf = P => m.l + plotW * (P - Pmin) / (Pmax - Pmin);
  // y axis: CBF (0 - 5 relative)
  const Fmax = 5;
  const yOf = F => m.top + plotH * (1 - F / Fmax);

  // Axis labels
  lblTick('Coronary perfusion pressure (mmHg)', m.l + plotW / 2, m.top + plotH + 24, 'center');
  ctx.save();
  ctx.translate(20, m.top + plotH / 2);
  ctx.rotate(-Math.PI / 2);
  lblTick('CBF (rel)', 0, 0, 'center');
  ctx.restore();

  // Tick marks
  for (let P = 40; P <= 160; P += 20) {
    const x = xOf(P);
    ctx.strokeStyle = '#2a3340';
    ctx.beginPath(); ctx.moveTo(x, m.top + plotH); ctx.lineTo(x, m.top + plotH + 4); ctx.stroke();
    lblTick(String(P), x, m.top + plotH + 14, 'center');
  }
  for (let F = 0; F <= Fmax; F += 1) {
    const y = yOf(F);
    ctx.strokeStyle = '#2a3340';
    ctx.beginPath(); ctx.moveTo(m.l - 4, y); ctx.lineTo(m.l, y); ctx.stroke();
    lblTick(String(F), m.l - 8, y + 4, 'right');
  }

  // Autoregulation plateau (resting): flat at CBF=1, plateau 60-140 mmHg, falls outside
  ctx.strokeStyle = '#5fc97a';
  ctx.lineWidth = 2.2;
  ctx.shadowColor = 'rgba(95,201,122,0.4)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  // Falling left limb
  ctx.moveTo(xOf(40), yOf(0.5));
  ctx.lineTo(xOf(60), yOf(1.0));
  // Plateau
  ctx.lineTo(xOf(140), yOf(1.0));
  // Falling right limb (pressure-induced damage)
  ctx.lineTo(xOf(160), yOf(1.2));
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Hyperemic line (linear): slope decreases with stenosis severity
  const s = p.stenosis / 100;
  const slopeFactor = 1 - Math.pow(s, 0.55); // 1.0 at 0%, ~0.41 at 50%, ~0.10 at 90%
  const maxSlope = 4 / 100; // (CBF=4 at P=100 normalized)
  const slope = maxSlope * slopeFactor;
  // CBF = slope * (P - Pzf), Pzf ≈ 20 mmHg
  const Pzf = 20;
  ctx.strokeStyle = '#4a90d9';
  ctx.lineWidth = 2.2;
  ctx.shadowColor = 'rgba(74,144,217,0.45)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(xOf(Pzf), yOf(0));
  ctx.lineTo(xOf(Pmax), yOf(Math.min(Fmax, slope * (Pmax - Pzf))));
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Marker at P=100 (typical coronary perfusion)
  const Phold = 100;
  const Frest = 1.0;
  const Fhyp = slope * (Phold - Pzf);
  ctx.fillStyle = '#5fc97a';
  ctx.beginPath(); ctx.arc(xOf(Phold), yOf(Frest), 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#4a90d9';
  ctx.beginPath(); ctx.arc(xOf(Phold), yOf(Math.min(Fmax, Fhyp)), 4, 0, Math.PI*2); ctx.fill();

  // CFR caliper from rest to hyperemic
  ctx.strokeStyle = '#fdcc4d';
  ctx.lineWidth = 1.4;
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(xOf(Phold), yOf(Frest)); ctx.lineTo(xOf(Phold), yOf(Math.min(Fmax, Fhyp))); ctx.stroke();
  ctx.setLineDash([]);
  const cfr = Math.min(Fmax, Fhyp) / Frest;
  lblCaliper('CFR ' + cfr.toFixed(1), xOf(Phold) + 10, yOf((Frest + Math.min(Fmax, Fhyp)) / 2) + 4, 'left');

  // Legend
  ctx.fillStyle = '#5fc97a'; ctx.font = '600 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('● Resting (autoregulation)', m.l + 12, m.top + 14);
  ctx.fillStyle = '#4a90d9';
  ctx.fillText('● Hyperemic (adenosine)', m.l + 12, m.top + 28);
  // Stenosis annotation
  lblHint('Stenosis ' + p.stenosis + '%', m.l + plotW - 8, m.top + 14, 'right');
}

// 2. GOULD CURVE -- CFR vs % stenosis
function drawGouldCurve(p, t) {
  ctx.clearRect(0, 0, W, H);
  const m = { l: 70, r: 60, top: 30, bot: 36 };
  const plotW = W - m.l - m.r, plotH = H - m.top - m.bot;
  ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(m.l, m.top); ctx.lineTo(m.l, m.top + plotH); ctx.lineTo(m.l + plotW, m.top + plotH);
  ctx.stroke();
  // x: stenosis 0-100, y: flow 0-5
  const xOf = S => m.l + plotW * S / 100;
  const Fmax = 5;
  const yOf = F => m.top + plotH * (1 - F / Fmax);
  // Ticks
  for (let S = 0; S <= 100; S += 20) {
    const x = xOf(S);
    ctx.strokeStyle = '#2a3340';
    ctx.beginPath(); ctx.moveTo(x, m.top + plotH); ctx.lineTo(x, m.top + plotH + 4); ctx.stroke();
    lblTick(S + '%', x, m.top + plotH + 14, 'center');
  }
  for (let F = 0; F <= Fmax; F += 1) {
    const y = yOf(F);
    ctx.strokeStyle = '#2a3340';
    ctx.beginPath(); ctx.moveTo(m.l - 4, y); ctx.lineTo(m.l, y); ctx.stroke();
    lblTick(String(F), m.l - 8, y + 4, 'right');
  }
  // Axis labels
  lblTick('Diameter stenosis', m.l + plotW / 2, m.top + plotH + 24, 'center');
  ctx.save(); ctx.translate(20, m.top + plotH / 2); ctx.rotate(-Math.PI / 2);
  lblTick('CBF (rel to rest)', 0, 0, 'center');
  ctx.restore();

  // Resting flow: flat at 1.0, falls off above ~85%
  ctx.strokeStyle = '#5fc97a'; ctx.lineWidth = 2.2;
  ctx.shadowColor = 'rgba(95,201,122,0.4)'; ctx.shadowBlur = 4;
  ctx.beginPath();
  for (let S = 0; S <= 100; S++) {
    const rest = S < 85 ? 1.0 : Math.max(0.3, 1 - 0.06 * (S - 85));
    if (S === 0) ctx.moveTo(xOf(S), yOf(rest)); else ctx.lineTo(xOf(S), yOf(rest));
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Hyperemic flow: 4 at 0%, falls along Gould curve
  ctx.strokeStyle = '#4a90d9'; ctx.lineWidth = 2.2;
  ctx.shadowColor = 'rgba(74,144,217,0.45)'; ctx.shadowBlur = 4;
  ctx.beginPath();
  for (let S = 0; S <= 100; S++) {
    const k = 1 - Math.pow(S / 100, 0.55);
    const hyp = Math.max(0.4, 4 * k);
    const rest = S < 85 ? 1.0 : Math.max(0.3, 1 - 0.06 * (S - 85));
    const F = Math.max(rest, hyp);  // hyperemic cannot fall below resting
    if (S === 0) ctx.moveTo(xOf(S), yOf(F)); else ctx.lineTo(xOf(S), yOf(F));
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Markers at current stenosis
  const S = p.stenosis;
  const k = 1 - Math.pow(S / 100, 0.55);
  const hyp = Math.max(0.4, 4 * k);
  const rest = S < 85 ? 1.0 : Math.max(0.3, 1 - 0.06 * (S - 85));
  ctx.fillStyle = '#5fc97a';
  ctx.beginPath(); ctx.arc(xOf(S), yOf(rest), 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#4a90d9';
  ctx.beginPath(); ctx.arc(xOf(S), yOf(Math.max(rest, hyp)), 4, 0, Math.PI*2); ctx.fill();

  // CFR vertical caliper
  ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1.4;
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(xOf(S), yOf(rest)); ctx.lineTo(xOf(S), yOf(Math.max(rest, hyp))); ctx.stroke();
  ctx.setLineDash([]);
  const cfr = Math.max(rest, hyp) / rest;
  lblCaliper('CFR ' + cfr.toFixed(1), xOf(S) + 8, yOf((rest + Math.max(rest, hyp)) / 2) + 4, 'left');

  // Vertical guide at S
  ctx.strokeStyle = 'rgba(253,204,77,0.25)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(xOf(S), m.top); ctx.lineTo(xOf(S), m.top + plotH); ctx.stroke();

  // Legend
  ctx.fillStyle = '#5fc97a'; ctx.font = '600 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('● Resting flow', m.l + 12, m.top + 14);
  ctx.fillStyle = '#4a90d9';
  ctx.fillText('● Hyperemic flow', m.l + 12, m.top + 28);

  // Threshold band: hyperemic flow falls below ~ FFR cut-off around 60-70% stenosis
  lblHint('Stenosis ' + S + '%', m.l + plotW - 8, m.top + 14, 'right');
}

// 3. FFR CONCEPT -- animated Pa and Pd tracings with adenosine slider
function drawFFRConcept(p, t) {
  ctx.clearRect(0, 0, W, H);
  // ECG strip top
  drawECGStrip(6, 22, W - 12, 4, 14, '#5fc97a');
  // Pressure plot below
  const m = { l: 50, r: 60, top: 50, bot: 32 };
  const plotW = W - m.l - m.r, plotH = H - m.top - m.bot;
  // y axis: pressure 0-130 mmHg
  const Pmax = 130;
  const yOf = P => m.top + plotH * (1 - P / Pmax);
  // Frame
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(m.l, m.top, plotW, plotH);
  ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 0.6;
  // Horizontal grid every 20 mmHg
  for (let P = 0; P <= Pmax; P += 20) {
    const y = yOf(P);
    ctx.beginPath(); ctx.moveTo(m.l, y); ctx.lineTo(m.l + plotW, y); ctx.stroke();
    lblTick(String(P), m.l - 6, y + 4, 'right');
  }
  // Compute
  const s = p.stenosis / 100;
  const h = p.hyperemia / 100;
  const restingPdPa = Math.max(0.86, 1 - 0.18 * Math.pow(s, 2.5));
  const maxHypFFR = Math.max(0.50, 1 - 0.55 * Math.pow(s, 1.7));
  const current = restingPdPa + (maxHypFFR - restingPdPa) * h;
  // 4 beats, sinusoidal-ish aortic pressure
  const beats = 4;
  const beatW = plotW / beats;
  // Heart rate-aware Pa morphology: systolic peak ~110 mmHg, diastolic ~70 mmHg
  function paPress(u) {
    // u in [0,1] within beat
    // Systole: rapid rise then dicrotic-shaped fall
    if (u < 0.32) {
      const r = u / 0.32;
      return 70 + 40 * (1 - Math.pow(1 - r, 2.2)); // 70 → 110
    } else if (u < 0.42) {
      const r = (u - 0.32) / 0.10;
      return 110 - 20 * r; // 110 → 90 (incisura)
    } else if (u < 0.50) {
      const r = (u - 0.42) / 0.08;
      return 90 - 5 * Math.sin(Math.PI * r); // dicrotic bump
    } else {
      const r = (u - 0.50) / 0.50;
      return 90 - 22 * (1 - Math.pow(1 - r, 1.3)); // diastolic decay 90 → 68
    }
  }
  // Pa tracing
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = 'rgba(239,68,68,0.45)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  for (let b = 0; b < beats; b++) {
    for (let i = 0; i <= 60; i++) {
      const u = i / 60;
      const Pa = paPress(u);
      const x = m.l + b * beatW + u * beatW;
      const y = yOf(Pa);
      if (b === 0 && i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Pd tracing: scales by current ratio. The ratio sharpens from resting to maximal hyperemia gradually across beats.
  ctx.strokeStyle = '#4a90d9';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = 'rgba(74,144,217,0.45)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  for (let b = 0; b < beats; b++) {
    // First half of strip is resting; second half is current hyperemia state
    const beatFrac = b / Math.max(1, beats - 1);
    const ratio = restingPdPa + (current - restingPdPa) * Math.min(1, beatFrac * 1.6);
    for (let i = 0; i <= 60; i++) {
      const u = i / 60;
      const Pa = paPress(u);
      const Pd = Pa * ratio;
      const x = m.l + b * beatW + u * beatW;
      const y = yOf(Pd);
      if (b === 0 && i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Adenosine arrow at the transition point (beat 2)
  const adenosineX = m.l + beatW * 1.0;
  ctx.strokeStyle = '#fdcc4d';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(adenosineX, m.top);
  ctx.lineTo(adenosineX, m.top + plotH);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#fdcc4d';
  ctx.font = '700 11px DM Sans, system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Adenosine', adenosineX + 4, m.top + 14);

  // Final beat FFR caliper
  const lastBeatX = m.l + (beats - 1) * beatW + beatW * 0.5;
  const PaMean = 88;
  const PdMean = PaMean * current;
  ctx.strokeStyle = '#fdcc4d';
  ctx.lineWidth = 1.6;
  ctx.setLineDash([3, 2]);
  ctx.beginPath();
  ctx.moveTo(lastBeatX, yOf(PaMean));
  ctx.lineTo(lastBeatX, yOf(PdMean));
  ctx.stroke();
  ctx.setLineDash([]);
  lblCaliper((h === 1 ? 'FFR ' : 'Pd/Pa ') + current.toFixed(2), lastBeatX + 6, yOf((PaMean + PdMean) / 2) + 4, 'left');

  // Legend
  ctx.fillStyle = '#ef4444'; ctx.font = '600 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('— Pa (aortic)', m.l + 8, m.top + 14);
  ctx.fillStyle = '#4a90d9';
  ctx.fillText('— Pd (distal)', m.l + 8, m.top + 28);
}

// 4. NHPR COMPARE -- atlas of cutoffs and trials in a table-like layout
function drawNHPRCompare(p, t) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2;

  if (p.view === 'cutoffs') {
    // Vertical bar plot — each NHPR plotted with its 0.89 cut-off line
    const m = { l: 80, r: 60, top: 30, bot: 40 };
    const plotW = W - m.l - m.r, plotH = H - m.top - m.bot;
    // y: ratio 0.70 - 1.00
    const yOf = r => m.top + plotH * (1.00 - r) / 0.30;
    // y ticks
    for (let r = 0.70; r <= 1.00; r += 0.05) {
      const y = yOf(r);
      ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.moveTo(m.l, y); ctx.lineTo(m.l + plotW, y); ctx.stroke();
      lblTick(r.toFixed(2), m.l - 6, y + 4, 'right');
    }
    // FFR cut-off band (0.75-0.80, severe)
    ctx.fillStyle = 'rgba(239,68,68,0.15)';
    ctx.fillRect(m.l, yOf(0.80), plotW, yOf(0.75) - yOf(0.80));
    // 0.89 cut-off line (NHPR)
    ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1.4;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(m.l, yOf(0.89)); ctx.lineTo(m.l + plotW, yOf(0.89)); ctx.stroke();
    ctx.setLineDash([]);
    lblCaliper('NHPR ≤ 0.89 → PCI', m.l + plotW - 4, yOf(0.89) - 5, 'right');
    // 0.80 cut-off line (FFR)
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.4;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(m.l, yOf(0.80)); ctx.lineTo(m.l + plotW, yOf(0.80)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ef4444';
    ctx.font = '700 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('FFR ≤ 0.80 → PCI', m.l + plotW - 4, yOf(0.80) - 5);
    // 0.92 line (Pd/Pa rest)
    ctx.strokeStyle = '#5fc97a'; ctx.lineWidth = 1.2;
    ctx.setLineDash([2, 4]);
    ctx.beginPath(); ctx.moveTo(m.l, yOf(0.92)); ctx.lineTo(m.l + plotW, yOf(0.92)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#5fc97a';
    ctx.fillText('Pd/Pa rest ≤ 0.92', m.l + plotW - 4, yOf(0.92) - 5);
    // x bars for each NHPR
    const labels = ['iFR', 'dPR', 'DFR', 'RFR', 'Pd/Pa', 'FFR'];
    const cutoffs = [0.89, 0.89, 0.89, 0.89, 0.92, 0.80];
    const colors  = ['#4a90d9', '#4a90d9', '#4a90d9', '#4a90d9', '#5fc97a', '#ef4444'];
    const barW = plotW / labels.length;
    for (let i = 0; i < labels.length; i++) {
      const x = m.l + i * barW + barW * 0.5;
      ctx.fillStyle = colors[i];
      ctx.beginPath(); ctx.arc(x, yOf(cutoffs[i]), 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#dde2ec';
      ctx.font = '700 12px DM Sans, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(labels[i], x, m.top + plotH + 22);
      ctx.fillStyle = colors[i];
      ctx.font = '600 11px DM Sans, system-ui, sans-serif';
      ctx.fillText(cutoffs[i].toFixed(2), x, yOf(cutoffs[i]) - 12);
    }
    lblTitle('NHPR / FFR cut-off thresholds at a glance', cx, m.top - 12);
  }

  if (p.view === 'evidence') {
    // Two-column comparison: trial name + key endpoint as boxes
    const trials = [
      { name: 'DEFINE-FLAIR', mode: 'iFR vs FFR', n: 2492, endpt: 'Non-inferior MACE at 1y', year: '2017' },
      { name: 'iFR-SWEDEHEART', mode: 'iFR vs FFR', n: 2037, endpt: 'Non-inferior MACE at 12mo', year: '2017' },
      { name: 'VALIDATE-RFR',  mode: 'RFR vs FFR', n: 651,  endpt: 'RFR ≤ 0.89 matched FFR ≤ 0.80', year: '2018' },
      { name: 'FAME',          mode: 'FFR vs angio', n: 1005, endpt: 'MACE 13% vs 18% at 2y', year: '2009' },
    ];
    const rowH = (H - 60) / trials.length;
    for (let i = 0; i < trials.length; i++) {
      const y = 40 + i * rowH;
      ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 1;
      ctx.strokeRect(20, y, W - 40, rowH - 10);
      ctx.fillStyle = '#1c2532';
      ctx.fillRect(20, y, W - 40, rowH - 10);
      ctx.fillStyle = '#4a90d9';
      ctx.font = '700 14px DM Sans, system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(trials[i].name, 36, y + 24);
      ctx.fillStyle = '#a8b1c0';
      ctx.font = '500 11px DM Sans, system-ui, sans-serif';
      ctx.fillText(trials[i].mode + '  ·  n = ' + trials[i].n.toLocaleString() + '  ·  ' + trials[i].year, 36, y + 40);
      ctx.fillStyle = '#dde2ec';
      ctx.font = '600 12px DM Sans, system-ui, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(trials[i].endpt, W - 36, y + 32);
    }
    lblTitle('Pivotal trials — non-hyperemic ratios and FFR', cx, 22);
  }

  if (p.view === 'where') {
    // Decision flowchart-ish layout
    lblTitle('When to use which?', cx, 30);
    const items = [
      { x: 50,        y: 65,  label: 'Adenosine OK?',    color: '#dde2ec' },
      { x: cx - 130,  y: 130, label: 'YES → FFR',         color: '#5fc97a' },
      { x: cx + 30,   y: 130, label: 'NO → use NHPR',     color: '#4a90d9' },
      { x: 50,        y: 195, label: 'Ostial / left main?', color: '#dde2ec' },
      { x: cx - 130,  y: 250, label: 'Disengage guide first', color: '#fdcc4d' },
      { x: cx + 30,   y: 250, label: 'Consider both; pullback', color: '#4a90d9' },
    ];
    for (const it of items) {
      ctx.fillStyle = '#1c2532';
      ctx.strokeStyle = it.color;
      ctx.lineWidth = 1.4;
      const tw = ctx.measureText(it.label).width + 24;
      ctx.beginPath();
      roundRect(it.x, it.y, tw, 32, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = it.color;
      ctx.font = '600 12.5px DM Sans, system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(it.label, it.x + 12, it.y + 21);
    }
  }
}

// 5. FFR PULLBACK -- vessel schematic with serial lesions + pressure trace
function drawFFRPullback(p, t) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(0, 0, W, H);

  const sp = p.proxStenosis / 100;
  const sd = p.distStenosis / 100;
  const Pa = 95;
  const ffrProxAlone = Math.max(0.55, 1 - 0.55 * Math.pow(sp, 1.7));
  const ffrDistAlone = Math.max(0.55, 1 - 0.55 * Math.pow(sd, 1.7));

  // Vessel schematic (top half)
  const vyc = 70;
  const vR = 22;  // baseline radius
  const vL = 60, vR0 = W - 60;
  // Lumen path: starts at radius vR, narrows at proximal lesion (~ 35%), reopens, narrows at distal (~ 65%), reopens
  const lesionProxX = vL + (vR0 - vL) * 0.32;
  const lesionDistX = vL + (vR0 - vL) * 0.68;
  const lesionW = 40;
  function lumenAt(x) {
    let r = vR;
    if (Math.abs(x - lesionProxX) < lesionW) {
      const u = (x - lesionProxX + lesionW) / (2 * lesionW); // 0..1
      const narrow = Math.sin(u * Math.PI); // 0 at edges, 1 mid
      r = vR * (1 - sp * narrow);
    }
    if (Math.abs(x - lesionDistX) < lesionW) {
      const u = (x - lesionDistX + lesionW) / (2 * lesionW);
      const narrow = Math.sin(u * Math.PI);
      r = vR * (1 - sd * narrow);
    }
    return r;
  }
  // Vessel wall (outer)
  ctx.fillStyle = '#1c2532';
  ctx.beginPath();
  ctx.moveTo(vL, vyc - vR - 3);
  ctx.lineTo(vR0, vyc - vR - 3);
  ctx.lineTo(vR0, vyc + vR + 3);
  ctx.lineTo(vL, vyc + vR + 3);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 1; ctx.stroke();
  // Lumen
  ctx.fillStyle = '#0d1019';
  ctx.beginPath();
  ctx.moveTo(vL, vyc - lumenAt(vL));
  for (let x = vL; x <= vR0; x += 2) ctx.lineTo(x, vyc - lumenAt(x));
  for (let x = vR0; x >= vL; x -= 2) ctx.lineTo(x, vyc + lumenAt(x));
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(vL, vyc - lumenAt(vL));
  for (let x = vL; x <= vR0; x += 2) ctx.lineTo(x, vyc - lumenAt(x));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(vL, vyc + lumenAt(vL));
  for (let x = vL; x <= vR0; x += 2) ctx.lineTo(x, vyc + lumenAt(x));
  ctx.stroke();
  // Labels
  lblTitle('Pullback under hyperemia', W / 2, 22);
  ctx.fillStyle = '#a8b1c0'; ctx.font = '600 10.5px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('proximal lesion ' + p.proxStenosis + '%', lesionProxX, vyc + vR + 18);
  ctx.fillText('distal lesion ' + p.distStenosis + '%', lesionDistX, vyc + vR + 18);

  // Pressure trace (bottom half) — Pa flat, Pd steps down across each lesion
  const py0 = vyc + vR + 36;
  const plotW = vR0 - vL;
  const plotH = H - py0 - 30;
  ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(vL, py0); ctx.lineTo(vL, py0 + plotH);
  ctx.lineTo(vR0, py0 + plotH);
  ctx.stroke();
  // Pa (flat at the top)
  const PaY = py0 + 18;
  ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.8;
  ctx.shadowColor = 'rgba(239,68,68,0.4)'; ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.moveTo(vL, PaY); ctx.lineTo(vR0, PaY); ctx.stroke();
  ctx.shadowBlur = 0;
  lblTick('Pa', vR0 + 4, PaY + 4, 'left');
  // Pd: drops at lesionProxX by ΔP_prox, then again at lesionDistX by ΔP_dist
  // ΔP / Pa = 1 - FFR_lesion
  const dPprox = (1 - ffrProxAlone);
  const dPdist = (1 - ffrDistAlone);
  const totalDrop = (1 - ffrProxAlone * ffrDistAlone);
  const maxDropPx = plotH - 24;
  const dropProxPx = dPprox / Math.max(0.5, totalDrop) * maxDropPx * 0.5;
  const dropDistPx = dPdist / Math.max(0.5, totalDrop) * maxDropPx * 0.5;
  ctx.strokeStyle = '#4a90d9'; ctx.lineWidth = 2;
  ctx.shadowColor = 'rgba(74,144,217,0.4)'; ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(vL, PaY);
  ctx.lineTo(lesionProxX - lesionW * 0.4, PaY);
  ctx.lineTo(lesionProxX + lesionW * 0.4, PaY + dropProxPx);
  ctx.lineTo(lesionDistX - lesionW * 0.4, PaY + dropProxPx);
  ctx.lineTo(lesionDistX + lesionW * 0.4, PaY + dropProxPx + dropDistPx);
  ctx.lineTo(vR0, PaY + dropProxPx + dropDistPx);
  ctx.stroke();
  ctx.shadowBlur = 0;
  lblTick('Pd', vR0 + 4, PaY + dropProxPx + dropDistPx + 4, 'left');
  // Caliper labels at each step
  ctx.fillStyle = '#fdcc4d'; ctx.font = '700 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('ΔP ' + (dPprox * 100).toFixed(0) + '%', lesionProxX, py0 + plotH - 4);
  ctx.fillText('ΔP ' + (dPdist * 100).toFixed(0) + '%', lesionDistX, py0 + plotH - 4);
  // Composite FFR label at far right
  const composite = ffrProxAlone * ffrDistAlone + 0.04 * (1 - ffrProxAlone) * (1 - ffrDistAlone);
  const compositeBounded = Math.max(0.45, composite);
  ctx.fillStyle = '#dde2ec'; ctx.font = '700 12px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('Composite FFR ' + compositeBounded.toFixed(2), vR0 - 6, py0 + 14);
}

// 6. IVUS NORMAL -- circular cross-section view
function drawIVUSNormal(p, t) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2 + 6;
  const R = Math.min(W, H) * 0.36;

  // Outer ring = adventitia (bright)
  ctx.fillStyle = '#cdd5e0';
  ctx.beginPath(); ctx.arc(cx, cy, R * 1.02, 0, Math.PI * 2); ctx.fill();

  // Media (dark band)
  ctx.fillStyle = '#222b3a';
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.92, 0, Math.PI * 2); ctx.fill();

  // Intima (bright thin)
  ctx.fillStyle = '#aab3c1';
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.84, 0, Math.PI * 2); ctx.fill();

  // Lumen modifications based on plaque type
  let lumenR = R * 0.78;
  let lumenColor = '#0a0d14';
  if (p.view === 'fatty') {
    // hypoechoic plaque (darker than adventitia), eccentric on one side
    lumenR = R * 0.58;
    ctx.fillStyle = '#3b4150';
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.82, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a0d14';
    ctx.beginPath();
    ctx.arc(cx + R * 0.10, cy - R * 0.05, lumenR, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.view === 'fibrotic') {
    // isoechoic / hyperechoic plaque
    lumenR = R * 0.58;
    ctx.fillStyle = '#7e8898';
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.82, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#0a0d14';
    ctx.beginPath();
    ctx.arc(cx - R * 0.06, cy + R * 0.08, lumenR, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.view === 'calcific') {
    // hyperechoic plaque with shadow (radial dark sector)
    ctx.fillStyle = '#0a0d14';
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.84, 0, Math.PI * 2);
    ctx.fill();
    // calcium arc (bright) — superficial
    ctx.fillStyle = '#f0f4fb';
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.84, -Math.PI * 0.18, Math.PI * 0.18);
    ctx.arc(cx, cy, R * 0.62, Math.PI * 0.18, -Math.PI * 0.18, true);
    ctx.closePath();
    ctx.fill();
    // shadow sector
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#0a0d14';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R * 0.95, -Math.PI * 0.18, Math.PI * 0.18);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    // lumen offset
    lumenR = R * 0.48;
    ctx.fillStyle = '#0a0d14';
    ctx.beginPath();
    ctx.arc(cx - R * 0.10, cy, lumenR, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Normal: clean lumen
    ctx.fillStyle = '#0a0d14';
    ctx.beginPath();
    ctx.arc(cx, cy, lumenR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Imaging catheter at the centre (ring-down artifact)
  ctx.fillStyle = '#dde2ec';
  ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1e2840';
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();
  // Faint ring artifact
  ctx.strokeStyle = 'rgba(220,225,235,0.18)';
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2); ctx.stroke();

  // Caliper labels — point to each layer
  if (p.view === 'normal') {
    ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1;
    ctx.setLineDash([2, 3]);
    // Adventitia
    ctx.beginPath(); ctx.moveTo(cx + R * 1.02 + 4, cy); ctx.lineTo(cx + R * 1.02 + 28, cy); ctx.stroke();
    // Media
    ctx.beginPath(); ctx.moveTo(cx + R * 0.88 + 4, cy + 6); ctx.lineTo(cx + R * 1.02 + 28, cy + 24); ctx.stroke();
    // Intima
    ctx.beginPath(); ctx.moveTo(cx + R * 0.82 + 4, cy + 12); ctx.lineTo(cx + R * 1.02 + 28, cy + 44); ctx.stroke();
    ctx.setLineDash([]);
    lblCaliper('Adventitia (bright)', cx + R * 1.02 + 32, cy + 4, 'left');
    lblCaliper('Media (dark)',        cx + R * 1.02 + 32, cy + 28, 'left');
    lblCaliper('Intima (bright)',     cx + R * 1.02 + 32, cy + 48, 'left');
  } else if (p.view === 'calcific') {
    ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(cx + R * 0.95, cy + 8); ctx.lineTo(cx + R + 28, cy + 18); ctx.stroke();
    ctx.setLineDash([]);
    lblCaliper('Acoustic shadow', cx + R + 32, cy + 22, 'left');
    lblCaliper('Calcium arc',     cx + R * 0.96, cy - R * 0.16, 'center');
  }

  // Title + scale bar
  lblTitle('IVUS cross-section — ' + (p.view === 'normal' ? 'normal' : p.view === 'fatty' ? 'fatty / soft plaque' : p.view === 'fibrotic' ? 'fibrotic plaque' : 'calcific plaque'), cx, 24);
  // 1 mm scale bar
  const sb = R / 5;
  ctx.strokeStyle = '#dde2ec'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(20, H - 16); ctx.lineTo(20 + sb, H - 16); ctx.stroke();
  lblTick('1 mm', 20, H - 22, 'left');
  // Modality marker
  ctx.fillStyle = '#4a90d9'; ctx.font = '700 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('IVUS', W - 14, H - 14);
}

// 7. IVUS QUANTITATIVE -- shows EEM contour + lumen contour + plaque + measurements
function drawIVUSQuantitative(p, t) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2 + 6;
  const sizePx = Math.min(W, H) * 0.36;
  // Scale: 1 mm² shown as sizePx² / (eem × scaleFactor)
  // Use a fixed visual scale where EEM = 22 mm² fills the canvas; smaller EEMs use proportional radius
  const Reem = sizePx * Math.sqrt(p.eem / 22);
  const Rlum = sizePx * Math.sqrt(Math.min(p.lumen, p.eem - 0.5) / 22);

  // Background tissue
  ctx.fillStyle = '#1c2532';
  ctx.beginPath(); ctx.arc(cx, cy, Reem + 8, 0, Math.PI * 2); ctx.fill();
  // EEM (outer bright)
  ctx.fillStyle = '#cdd5e0';
  ctx.beginPath(); ctx.arc(cx, cy, Reem, 0, Math.PI * 2); ctx.fill();
  // Plaque (gradient gray)
  const grad = ctx.createRadialGradient(cx, cy, Rlum, cx, cy, Reem);
  grad.addColorStop(0, '#4a5466');
  grad.addColorStop(1, '#2a3340');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, Reem * 0.96, 0, Math.PI * 2); ctx.fill();
  // Lumen (dark)
  ctx.fillStyle = '#0a0d14';
  ctx.beginPath(); ctx.arc(cx, cy, Rlum, 0, Math.PI * 2); ctx.fill();

  // Contours
  ctx.strokeStyle = '#4a90d9'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(cx, cy, Reem * 0.96, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(cx, cy, Rlum, 0, Math.PI * 2); ctx.stroke();

  // Catheter centre
  ctx.fillStyle = '#dde2ec';
  ctx.beginPath(); ctx.arc(cx, cy, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1e2840';
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2); ctx.fill();

  // Calipers (radius arrows from centre)
  ctx.strokeStyle = '#4a90d9'; ctx.lineWidth = 1.2;
  ctx.setLineDash([3, 2]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Reem * 0.96 * Math.cos(-Math.PI*0.25), cy + Reem * 0.96 * Math.sin(-Math.PI*0.25));
  ctx.stroke();
  ctx.strokeStyle = '#fdcc4d';
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Rlum * Math.cos(Math.PI*0.18), cy + Rlum * Math.sin(Math.PI*0.18));
  ctx.stroke();
  ctx.setLineDash([]);

  // Title + scale + labels
  lblTitle('IVUS quantitative measurement', cx, 24);
  // Labels box on right
  const lx = W - 130;
  ctx.fillStyle = 'rgba(28,37,50,0.92)';
  roundRect(lx, 50, 120, 130, 8);
  ctx.fill();
  ctx.strokeStyle = '#2a3340'; ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#4a90d9'; ctx.font = '700 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('EEM', lx + 10, 70);
  ctx.fillStyle = '#dde2ec'; ctx.font = '600 13px DM Sans, system-ui, sans-serif';
  ctx.fillText(p.eem.toFixed(1) + ' mm²', lx + 10, 86);
  ctx.fillStyle = '#fdcc4d'; ctx.font = '700 11px DM Sans, system-ui, sans-serif';
  ctx.fillText('MLA', lx + 10, 106);
  ctx.fillStyle = '#dde2ec'; ctx.font = '600 13px DM Sans, system-ui, sans-serif';
  ctx.fillText(Math.min(p.lumen, p.eem - 0.5).toFixed(1) + ' mm²', lx + 10, 122);
  ctx.fillStyle = '#a8b1c0'; ctx.font = '700 11px DM Sans, system-ui, sans-serif';
  ctx.fillText('Plaque burden', lx + 10, 142);
  const pb = ((p.eem - Math.min(p.lumen, p.eem - 0.5)) / p.eem) * 100;
  ctx.fillStyle = pb >= 70 ? '#ef4444' : pb >= 50 ? '#f59e0b' : '#5fc97a';
  ctx.font = '600 13px DM Sans, system-ui, sans-serif';
  ctx.fillText(pb.toFixed(0) + ' %', lx + 10, 158);

  // 1 mm scale
  ctx.strokeStyle = '#dde2ec'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(20, H - 16); ctx.lineTo(20 + sizePx / 5, H - 16); ctx.stroke();
  lblTick('1 mm', 20, H - 22, 'left');
  ctx.fillStyle = '#4a90d9'; ctx.font = '700 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('IVUS', lx - 16, H - 14);
}

// 8. OCT NORMAL -- circular cross-section, sharper layer rendering, plaque morphology variants
function drawOCTNormal(p, t) {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(0, 0, W, H);
  const cx = W / 2, cy = H / 2 + 6;
  const R = Math.min(W, H) * 0.36;

  // Adventitia (outer bright)
  ctx.fillStyle = '#e8eef7';
  ctx.beginPath(); ctx.arc(cx, cy, R * 1.02, 0, Math.PI * 2); ctx.fill();
  // Media (dark band - crisper than IVUS)
  ctx.fillStyle = '#0d1422';
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.92, 0, Math.PI * 2); ctx.fill();
  // Intima (bright thin)
  ctx.fillStyle = '#c5cdd9';
  ctx.beginPath(); ctx.arc(cx, cy, R * 0.84, 0, Math.PI * 2); ctx.fill();

  // Morphology overlays
  if (p.view === 'fibrous') {
    // Homogeneous bright signal-rich plaque
    ctx.fillStyle = '#a8b2c1';
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.82, -Math.PI * 0.3, Math.PI * 0.45);
    ctx.arc(cx, cy, R * 0.58, Math.PI * 0.45, -Math.PI * 0.3, true);
    ctx.closePath();
    ctx.fill();
  }
  if (p.view === 'lipid') {
    // Signal-poor with DIFFUSE attenuation (gradient fading outward)
    const grad = ctx.createRadialGradient(cx + R * 0.2, cy, R * 0.05, cx + R * 0.2, cy, R * 0.6);
    grad.addColorStop(0, '#5b6478');
    grad.addColorStop(0.5, '#34394a');
    grad.addColorStop(1, '#15192a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.82, -Math.PI * 0.35, Math.PI * 0.20);
    ctx.arc(cx, cy, R * 0.50, Math.PI * 0.20, -Math.PI * 0.35, true);
    ctx.closePath();
    ctx.fill();
    // Thin fibrous cap (bright thin line over the lipid)
    ctx.strokeStyle = '#dde2ec'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.80, -Math.PI * 0.32, Math.PI * 0.18);
    ctx.stroke();
  }
  if (p.view === 'calcium') {
    // Signal-poor with SHARP leading edge (pathognomonic)
    ctx.fillStyle = '#1a1f2e';
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.78, -Math.PI * 0.18, Math.PI * 0.18);
    ctx.arc(cx, cy, R * 0.50, Math.PI * 0.18, -Math.PI * 0.18, true);
    ctx.closePath();
    ctx.fill();
    // Sharp leading edge — pathognomonic on OCT
    ctx.strokeStyle = '#dde2ec'; ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.78, -Math.PI * 0.18, Math.PI * 0.18);
    ctx.stroke();
    // Sharp trailing edge (visible because no acoustic shadow on OCT for thin calcium)
    ctx.strokeStyle = 'rgba(220,225,235,0.45)'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(cx, cy, R * 0.52, -Math.PI * 0.18, Math.PI * 0.18);
    ctx.stroke();
  }

  // Lumen
  let lumenR = R * 0.78;
  let lcx = cx, lcy = cy;
  if (p.view === 'fibrous' || p.view === 'lipid' || p.view === 'calcium') {
    lumenR = R * 0.55;
    lcx = cx - R * 0.08;
  }
  ctx.fillStyle = '#0a0d14';
  ctx.beginPath(); ctx.arc(lcx, lcy, lumenR, 0, Math.PI * 2); ctx.fill();

  // Catheter
  ctx.fillStyle = '#dde2ec';
  ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1e2840';
  ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI * 2); ctx.fill();
  // Wire shadow (one radial sector unilluminated)
  ctx.save();
  ctx.fillStyle = 'rgba(10,13,20,0.55)';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, R * 1.05, Math.PI * 0.55, Math.PI * 0.60);
  ctx.closePath();
  ctx.fill();
  // Wire dot
  ctx.fillStyle = '#dde2ec';
  ctx.beginPath();
  ctx.arc(cx + 14 * Math.cos(Math.PI * 0.575), cy + 14 * Math.sin(Math.PI * 0.575), 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Annotations
  if (p.view === 'normal') {
    ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1;
    ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(cx + R * 1.04, cy - 18); ctx.lineTo(cx + R * 1.04 + 30, cy - 28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + R * 0.88, cy + 8); ctx.lineTo(cx + R + 32, cy + 18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + R * 0.82, cy + 24); ctx.lineTo(cx + R + 32, cy + 42); ctx.stroke();
    ctx.setLineDash([]);
    lblCaliper('Adventitia',  cx + R * 1.04 + 34, cy - 24, 'left');
    lblCaliper('Media',       cx + R + 36, cy + 22, 'left');
    lblCaliper('Intima',      cx + R + 36, cy + 46, 'left');
  }
  if (p.view === 'lipid') {
    ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(cx + R * 0.80, cy - R * 0.18); ctx.lineTo(cx + R + 32, cy - R * 0.35); ctx.stroke();
    ctx.setLineDash([]);
    lblCaliper('Fibrous cap (~ 65 µm)', cx + R + 36, cy - R * 0.32, 'left');
    lblCaliper('Lipid pool (diffuse)',  cx + R + 36, cy + R * 0.05, 'left');
  }
  if (p.view === 'calcium') {
    ctx.strokeStyle = '#fdcc4d'; ctx.lineWidth = 1; ctx.setLineDash([2, 3]);
    ctx.beginPath(); ctx.moveTo(cx + R * 0.80, cy - R * 0.06); ctx.lineTo(cx + R + 32, cy - R * 0.18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + R * 0.52, cy - R * 0.06); ctx.lineTo(cx + R + 32, cy + R * 0.10); ctx.stroke();
    ctx.setLineDash([]);
    lblCaliper('Sharp leading edge', cx + R + 36, cy - R * 0.14, 'left');
    lblCaliper('Inner border (visible)', cx + R + 36, cy + R * 0.14, 'left');
  }

  // Title + scale
  const titleMap = { normal: 'OCT — normal three-layer', fibrous: 'OCT — fibrous plaque', lipid: 'OCT — lipid plaque / TCFA', calcium: 'OCT — calcific plaque' };
  lblTitle(titleMap[p.view] || 'OCT cross-section', cx, 24);
  ctx.strokeStyle = '#dde2ec'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(20, H - 16); ctx.lineTo(20 + R / 5, H - 16); ctx.stroke();
  lblTick('1 mm', 20, H - 22, 'left');
  ctx.fillStyle = '#5fc97a'; ctx.font = '700 11px DM Sans, system-ui, sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('OCT', W - 14, H - 14);
}

// ═══════════════════════════════════════════════════════════
// MODULE LIFECYCLE
// ═══════════════════════════════════════════════════════════
let activeModule = 'ffr_concept';
let inputState = {}; // current parameter values for active module

// Sidebar grouping. Order modules into clinical categories.
const MODULE_GROUPS = [
  { name: 'Coronary Physiology', modules: ['pressure_flow', 'gould_curve', 'ffr_concept', 'nhpr_compare'] },
  { name: 'FFR Clinical',        modules: ['ffr_pullback'] },
  { name: 'IVUS',                modules: ['ivus_normal', 'ivus_quantitative'] },
  { name: 'OCT',                 modules: ['oct_normal'] },
];

function buildSidebar() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  let i = 1;
  for (const group of MODULE_GROUPS) {
    const header = document.createElement('div');
    header.className = 'module-group-header';
    header.textContent = group.name;
    list.appendChild(header);
    for (const id of group.modules) {
      const m = MODULES[id];
      if (!m) continue;
      const btn = document.createElement('button');
      btn.className = 'module-btn' + (id === activeModule ? ' active' : '');
      btn.dataset.module = id;
      btn.innerHTML = `<span class="num">${i}</span><span>${m.title.replace(/<sub>(.*?)<\/sub>/g, '$1').replace(/<sup>(.*?)<\/sup>/g, '$1')}</span>`;
      btn.onclick = () => selectModule(id);
      list.appendChild(btn);
      i++;
    }
  }
}

function selectModule(id) {
  activeModule = id;
  document.querySelectorAll('.module-btn').forEach(b => b.classList.toggle('active', b.dataset.module === id));
  const m = MODULES[id];
  document.getElementById('modTitle').innerHTML = m.title;
  document.getElementById('modPurpose').innerHTML = m.purpose;
  (function renderFormula() {
    // Split on `&nbsp;·&nbsp;` (the explicit separator). Plain ` · ` is treated as math
    // (e.g. `4 · (TR Vmax)²`) and stays on the same line.
    const raw = m.formula || '';
    const parts = raw.split(/&nbsp;\s*·\s*&nbsp;/).map(s => s.trim()).filter(Boolean);
    document.getElementById('modFormula').innerHTML = parts.map(p => `<div class="formula-line">${p}</div>`).join('');
  })();
  // Calculator cross-link button (only for atlas modules with a calculatorLink)
  const linkRow = document.getElementById('calcLinkRow');
  const linkBtn = document.getElementById('calcLinkBtn');
  if (m.calculatorLink && MODULES[m.calculatorLink]) {
    const target = MODULES[m.calculatorLink];
    const targetTitle = target.title.replace(/<sub>(.*?)<\/sub>/g, '$1').replace(/<sup>(.*?)<\/sup>/g, '$1');
    linkBtn.innerHTML = '→ Open ' + targetTitle + ' calculator';
    linkBtn.onclick = (e) => { e.stopPropagation(); selectModule(m.calculatorLink); };
    linkRow.style.display = '';
  } else {
    linkRow.style.display = 'none';
  }
  buildInputs(m);
  recompute();
  startAnim();
}

function buildInputs(m) {
  const wrap = document.getElementById('modInputs');
  wrap.innerHTML = '';
  inputState = {};
  // Hide the Inputs card entirely for static atlas modules with no inputs
  const inputsCard = document.querySelector('.inputs-card');
  if (inputsCard) inputsCard.style.display = (m.inputs && m.inputs.length > 0) ? '' : 'none';
  for (const inp of m.inputs) {
    inputState[inp.key] = inp.default;
    if (inp.type === 'slider') {
      const row = document.createElement('div');
      row.className = 'input-row';
      row.innerHTML = `
        <label>${inp.label}</label>
        <input type="range" min="${inp.min}" max="${inp.max}" step="${inp.step}" value="${inp.default}" data-key="${inp.key}" data-decimals="${inp.decimals || 1}">
        <span class="val" id="val-${inp.key}">${(+inp.default).toFixed(inp.decimals || 1)}</span>
        <span class="unit">${inp.unit}</span>
      `;
      wrap.appendChild(row);
      const slider = row.querySelector('input');
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        inputState[inp.key] = v;
        document.getElementById('val-' + inp.key).textContent = v.toFixed(inp.decimals || 1);
        recompute();
      });
    } else if (inp.type === 'picker') {
      const row = document.createElement('div');
      row.className = 'picker-row';
      row.innerHTML = `<label>${inp.label}</label><div class="picker-options"></div><div class="picker-help" id="help-${inp.key}"></div>`;
      const opts = row.querySelector('.picker-options');
      const help = row.querySelector('.picker-help');
      for (const opt of inp.options) {
        const b = document.createElement('button');
        b.className = 'picker-opt' + (opt.v === inp.default ? ' active' : '');
        b.textContent = opt.text;
        b.onclick = () => {
          inputState[inp.key] = opt.v;
          opts.querySelectorAll('.picker-opt').forEach(o => o.classList.remove('active'));
          b.classList.add('active');
          help.textContent = opt.help;
          recompute();
        };
        opts.appendChild(b);
        if (opt.v === inp.default) help.textContent = opt.help;
      }
      wrap.appendChild(row);
    }
  }
}

function recompute() {
  const m = MODULES[activeModule];
  const out = m.compute(inputState);
  const wrap = document.getElementById('modOutputs');
  wrap.innerHTML = out.map(o => {
    const classes = ['output-cell'];
    if (o.text) classes.push('text');
    if (o.wide) classes.push('wide');
    const sev = o.severity ? `<div class="severity-pill ${o.severity.klass}">${o.severity.label}</div>` : '';
    return `<div class="${classes.join(' ')}">
      <div class="output-label">${o.label}</div>
      <div class="output-value">${o.value}${o.unit ? `<span class="output-unit">${o.unit}</span>` : ''}</div>
      ${sev}
    </div>`;
  }).join('');
  // Pitfalls
  const pitfallsWrap = document.getElementById('modPitfalls');
  pitfallsWrap.innerHTML = m.pitfalls.map(p => `<div class="pitfall"><span>${p}</span></div>`).join('');
  refreshDraw();
}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP — runs ~3 sec on click / module switch, then fades out
// ═══════════════════════════════════════════════════════════
const ANIM_DURATION_MS = 3000;
const ANIM_FADE_MS = 800;     // last fraction of the window where motion fades to 0
let animActive = false;
let animStartTime = 0;
let phase = 0;        // monotonic time fed into draw() — only advances during the animation window
let lastT = 0;
let animFade = 0;     // 0..1 multiplier on motion-element opacity (particles, pulses)

function refreshDraw() {
  const m = MODULES[activeModule];
  if (m && m.draw) m.draw(inputState, phase);
}

function loop(t) {
  if (lastT === 0) lastT = t;
  phase += (t - lastT);
  lastT = t;
  const elapsed = t - animStartTime;
  if (elapsed < ANIM_DURATION_MS - ANIM_FADE_MS) {
    animFade = 1;
  } else if (elapsed < ANIM_DURATION_MS) {
    animFade = (ANIM_DURATION_MS - elapsed) / ANIM_FADE_MS;
  } else {
    animFade = 0;
  }
  refreshDraw();
  if (elapsed < ANIM_DURATION_MS) {
    requestAnimationFrame(loop);
  } else {
    animActive = false;
    lastT = 0;
  }
}

function startAnim() {
  animStartTime = performance.now();
  animFade = 1;
  if (!animActive) {
    animActive = true;
    lastT = 0;
    requestAnimationFrame(loop);
  }
}
document.addEventListener('click', startAnim);

// ═══════════════════════════════════════════════════════════
// DARK MODE
// ═══════════════════════════════════════════════════════════
function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  document.getElementById('darkToggle').textContent = isDark ? 'Light Mode' : 'Dark Mode';
  try { localStorage.setItem('cathmath_dark', isDark ? '1' : '0'); } catch(e) {}
}
try {
  const pref = localStorage.getItem('cathmath_dark');
  if (pref === '0') {
    document.body.classList.remove('dark');
    document.getElementById('darkToggle').textContent = 'Dark Mode';
  }
} catch(e) {}

window.addEventListener('resize', () => { resizeCanvas(); refreshDraw(); });
resizeCanvas();
buildSidebar();
selectModule('ffr_concept');
