// ════════════════════════════════════════════════════════════════════
// CANVAS SIZING
// ════════════════════════════════════════════════════════════════════

const ECG_HEIGHT = 50;

function sizeCanvases() {
  const area = canvasArea;
  const w = area.clientWidth;
  const h = area.clientHeight - ECG_HEIGHT;

  ecgCanvas.width = w * DPR;
  ecgCanvas.height = ECG_HEIGHT * DPR;
  ecgCanvas.style.width = w + 'px';
  ecgCanvas.style.height = ECG_HEIGHT + 'px';

  waveCanvas.width = w * DPR;
  waveCanvas.height = Math.max(200, h) * DPR;
  waveCanvas.style.width = w + 'px';
  waveCanvas.style.height = Math.max(200, h) + 'px';

  redrawNeeded = true;
}

// ════════════════════════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════════════════════════

function mmHgToY(mmHg, scale, canvasH) {
  const range = scale.max - scale.min;
  const frac = (mmHg - scale.min) / range;
  const margin = 20 * DPR;
  return canvasH - margin - frac * (canvasH - 2 * margin);
}

function drawGrid(ctx, w, h, scale) {
  ctx.save();
  // Minor gridlines
  ctx.strokeStyle = getComputedColor('var(--grid-minor)');
  ctx.lineWidth = 1;
  for (let mmHg = scale.min; mmHg <= scale.max; mmHg += (scale.step / 5) || 1) {
    const y = mmHgToY(mmHg, scale, h);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  // Major gridlines + labels
  ctx.strokeStyle = getComputedColor('var(--grid-major)');
  ctx.lineWidth = 1;
  ctx.fillStyle = getComputedColor('var(--text-dim)');
  ctx.font = `${10 * DPR}px -apple-system, Helvetica Neue, sans-serif`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let mmHg = scale.min; mmHg <= scale.max; mmHg += scale.step) {
    const y = mmHgToY(mmHg, scale, h);
    ctx.beginPath(); ctx.moveTo(40 * DPR, y); ctx.lineTo(w, y); ctx.stroke();
    ctx.fillText(mmHg.toString(), 36 * DPR, y);
  }
  ctx.restore();
}

function getScrollDPR() {
  // Snap scroll to integer device pixels to prevent sub-pixel aliasing (vibrating traces)
  return Math.round(scrollX * DPR);
}

function drawECG(ctx, w, h) {
  ctx.save();
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = getComputedColor('var(--bg)');
  ctx.fillRect(0, 0, w, h);

  const beatDuration = 60 / HR;
  const pxPerSec = speed * 3.78 * DPR;
  const pxPerBeat = beatDuration * pxPerSec;
  const sX = getScrollDPR();

  ctx.strokeStyle = getComputedColor('var(--ecg-green)');
  ctx.lineWidth = 1.5 * DPR;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.shadowColor = getComputedColor('var(--ecg-green)');
  ctx.shadowBlur = 4 * DPR;

  const midY = h / 2;
  const amp = h * 0.35;

  ctx.beginPath();
  for (let px = 0; px < w; px++) {
    const worldX = px + sX;
    const worldXInt = Math.round(worldX);
    const beatFrac = ((worldX / pxPerBeat) % 1 + 1) % 1;
    let val;
    if (bufferActive) {
      const bufEntry = waveBuffer.get(worldXInt);
      if (bufEntry && bufEntry._ecg != null) {
        val = bufEntry._ecg;
      } else {
        const alt = waveBuffer.get(worldXInt - 1) || waveBuffer.get(worldXInt + 1);
        val = (alt && alt._ecg != null) ? alt._ecg : generateECG(beatFrac, { HR });
      }
    } else {
      val = generateECG(beatFrac, { HR });
    }
    const y = midY - val * amp;
    if (px === 0) ctx.moveTo(px, y); else ctx.lineTo(px, y);
  }
  ctx.stroke();
  ctx.restore();

  // Label
  ctx.save();
  ctx.font = `${9 * DPR}px -apple-system, Helvetica Neue, sans-serif`;
  ctx.fillStyle = getComputedColor('var(--ecg-green)');
  ctx.globalAlpha = 0.6;
  ctx.fillText('ECG Lead II', 8 * DPR, 12 * DPR);
  ctx.restore();
}

// Auto-compute scale from visible traces
function computeAutoScale(traces, lessonScale) {
  let maxP = 0;
  const lesson = LESSONS[currentLesson];
  const needsExtra = (lesson && (lesson.hasResp || lesson.hasProvocation));

  if (needsExtra) {
    // For resp/PVC lessons: ALWAYS compute from baseline gen() with state neutralized.
    // Temporarily disable resp and reset pvcState, then re-evaluate lesson.traces()
    // to get baseline generators (not post-PVC augmented or resp-modified).
    // This prevents: (1) scale oscillation from changing respPhase each frame,
    // (2) scale jump at toggle time (buffer vs gen() sampling find different maxP),
    // (3) pvcState causing scale to expand then contract during PVC cycle.
    // The 25% headroom below accommodates respiratory/PVC peaks above baseline.
    const savedResp = respEnabled;
    const savedPvc = pvcState;
    respEnabled = false;
    pvcState = 'none';
    const baseTraces = typeof lesson.traces === 'function' ? lesson.traces() : lesson.traces;
    baseTraces.forEach(tr => {
      if (!traceVis[tr.id]) return;
      for (let b = 0; b <= 1; b += 0.005) {
        const v = tr.gen(b);
        if (v > maxP) maxP = v;
      }
    });
    respEnabled = savedResp;
    pvcState = savedPvc;
  } else {
    // Normal stateless rendering — sample gen() across a full beat
    traces.forEach(tr => {
      if (!traceVis[tr.id]) return;
      for (let b = 0; b <= 1; b += 0.01) {
        const v = tr.gen(b);
        if (v > maxP) maxP = v;
      }
    });
  }

  if (maxP <= 0) return lessonScale;
  // Consistent headroom: resp/PVC lessons always get 25% to accommodate modulation peaks
  const headroom = maxP * (needsExtra ? 0.25 : 0.12);
  const raw = maxP + headroom;
  // Pick nice step sizes
  let step, maxVal;
  if (raw <= 15)       { step = 2;  maxVal = Math.ceil(raw / 2) * 2; }
  else if (raw <= 50)  { step = 5;  maxVal = Math.ceil(raw / 5) * 5; }
  else if (raw <= 100) { step = 10; maxVal = Math.ceil(raw / 10) * 10; }
  else if (raw <= 250) { step = 20; maxVal = Math.ceil(raw / 20) * 20; }
  else                 { step = 50; maxVal = Math.ceil(raw / 50) * 50; }
  return { min: 0, max: maxVal, step };
}

function drawWaveforms(ctx, w, h) {
  ctx.save();
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = getComputedColor('var(--bg)');
  ctx.fillRect(0, 0, w, h);

  const lesson = LESSONS[currentLesson];
  const traces = typeof lesson.traces === 'function' ? lesson.traces() : lesson.traces;

  // Auto-scale based on visible traces
  const scale = computeAutoScale(traces, lesson.scale);

  drawGrid(ctx, w, h, scale);

  const beatDuration = 60 / HR;
  const pxPerSec = speed * 3.78 * DPR;
  const pxPerBeat = beatDuration * pxPerSec;

  // Draw gradient shading first
  if (lesson.gradient) {
    ctx.save();
    ctx.fillStyle = getComputedColor('var(--gradient-fill)');
    ctx.beginPath();
    let inGrad = false;
    let topPts = [], botPts = [];
    for (let px = 0; px < w; px++) {
      const worldX = px + getScrollDPR();
      const worldXInt = Math.round(worldX);
      const beatFrac = ((worldX / pxPerBeat) % 1 + 1) % 1;
      // When buffer active, compute gradient from frozen buffer values (not gen())
      let g;
      if (bufferActive) {
        const bufEntry = waveBuffer.get(worldXInt) || waveBuffer.get(worldXInt - 1) || waveBuffer.get(worldXInt + 1);
        if (bufEntry && bufEntry.lv != null && bufEntry.ao != null) {
          const lvP = bufEntry.lv, aoP = bufEntry.ao;
          if (beatFrac > 0.05 && beatFrac < 0.32 && lvP > aoP) {
            g = { top: aoP, bottom: lvP };
          } else { g = null; }
        } else { g = lesson.gradient(beatFrac); }
      } else {
        g = lesson.gradient(beatFrac);
      }
      if (g) {
        topPts.push({ x: px, y: mmHgToY(g.bottom, scale, h) });
        botPts.push({ x: px, y: mmHgToY(g.top, scale, h) });
        inGrad = true;
      } else if (inGrad) {
        // Draw accumulated gradient region
        if (topPts.length > 2) {
          ctx.beginPath();
          ctx.moveTo(topPts[0].x, topPts[0].y);
          for (let i = 1; i < topPts.length; i++) ctx.lineTo(topPts[i].x, topPts[i].y);
          for (let i = botPts.length - 1; i >= 0; i--) ctx.lineTo(botPts[i].x, botPts[i].y);
          ctx.closePath();
          ctx.fill();
        }
        topPts = []; botPts = [];
        inGrad = false;
      }
    }
    // Flush remaining
    if (topPts.length > 2) {
      ctx.beginPath();
      ctx.moveTo(topPts[0].x, topPts[0].y);
      for (let i = 1; i < topPts.length; i++) ctx.lineTo(topPts[i].x, topPts[i].y);
      for (let i = botPts.length - 1; i >= 0; i--) ctx.lineTo(botPts[i].x, botPts[i].y);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  // Draw compare normal traces (dashed, behind)
  if (compareNormal && lesson.normalTraces) {
    lesson.normalTraces.forEach(tr => {
      ctx.save();
      ctx.strokeStyle = getComputedColor(tr.color);
      ctx.lineWidth = 1.5 * DPR;
      ctx.setLineDash([6 * DPR, 4 * DPR]);
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      for (let px = 0; px < w; px++) {
        const worldX = px + getScrollDPR();
        const beatFrac = ((worldX / pxPerBeat) % 1 + 1) % 1;
        const mmHg = tr.gen(beatFrac);
        const y = mmHgToY(mmHg, scale, h);
        if (px === 0) ctx.moveTo(px, y); else ctx.lineTo(px, y);
      }
      ctx.stroke();
      ctx.restore();
    });
  }

  // Draw main traces — collect label positions for collision avoidance
  const labelQueue = [];
  traces.forEach(tr => {
    if (!traceVis[tr.id]) return;
    ctx.save();
    const color = getComputedColor(tr.color);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2 * DPR;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = 3 * DPR;

    ctx.beginPath();
    let labelX = 0, labelY = 0, maxVal = -Infinity;
    for (let px = 0; px < w; px++) {
      const worldX = px + getScrollDPR();
      const worldXInt = Math.round(worldX);
      const beatFrac = ((worldX / pxPerBeat) % 1 + 1) % 1;
      let mmHg;
      if (bufferActive) {
        const bufEntry = waveBuffer.get(worldXInt);
        if (bufEntry && tr.id in bufEntry) {
          mmHg = bufEntry[tr.id];
        } else {
          const alt = waveBuffer.get(worldXInt - 1) || waveBuffer.get(worldXInt + 1);
          mmHg = (alt && tr.id in alt) ? alt[tr.id] : tr.gen(beatFrac);
        }
      } else {
        mmHg = tr.gen(beatFrac);
      }
      const y = mmHgToY(mmHg, scale, h);
      if (px === 0) ctx.moveTo(px, y); else ctx.lineTo(px, y);
      if (mmHg > maxVal && px < pxPerBeat) {
        maxVal = mmHg;
        labelX = px;
        labelY = y;
      }
    }
    ctx.stroke();
    ctx.restore();
    labelQueue.push({ label: tr.label, color, x: labelX + 6 * DPR, y: labelY - 6 * DPR, mmHg: maxVal });
  });

  // Draw labels with collision avoidance
  if (document.getElementById('showLabels')?.checked && labelQueue.length) {
    // Sort by Y position (top to bottom) so we nudge lower labels down
    labelQueue.sort((a, b) => a.y - b.y);
    const minGap = 13 * DPR;
    for (let i = 1; i < labelQueue.length; i++) {
      const prev = labelQueue[i - 1];
      const curr = labelQueue[i];
      if (Math.abs(curr.x - prev.x) < 60 * DPR && curr.y - prev.y < minGap) {
        curr.y = prev.y + minGap;
      }
    }
    ctx.save();
    ctx.shadowBlur = 0;
    ctx.font = `bold ${10 * DPR}px -apple-system, Helvetica Neue, sans-serif`;
    ctx.textAlign = 'left';
    labelQueue.forEach(lbl => {
      ctx.fillStyle = lbl.color;
      ctx.fillText(lbl.label, lbl.x, lbl.y);
    });
    ctx.restore();
  }

  // ── a-c-v-x-y annotations ──────────────────────────────────────
  if (document.getElementById('showAnnotations')?.checked) {
    // Find actual local extremum near expected beat position
    // dir=1 → find local max (peak), dir=-1 → find local min (trough)
    function findExtremum(gen, center, dir, range) {
      const r = range || 0.04;
      let bestB = center, bestV = gen(center);
      for (let b = center - r; b <= center + r; b += 0.002) {
        const bf = ((b % 1) + 1) % 1;
        const v = gen(bf);
        if ((dir === 1 && v > bestV) || (dir === -1 && v < bestV)) {
          bestV = v; bestB = bf;
        }
      }
      return { beat: bestB, mmHg: bestV };
    }

    // Annotation defs: ch=label, hint=approximate beat, dir=1 peak/-1 trough
    function getRAAnnotations() {
      const p = getAnnotationParams('ra');
      if (!p) return [];
      const annots = [
        { ch: 'a', hint: p.aCenter || 0.08, dir: 1 },
        { ch: 'x', hint: p.xCenter || 0.22, dir: -1 },
        { ch: 'v', hint: p.vCenter || 0.44, dir: 1 },
        { ch: 'y', hint: p.yCenter || 0.60, dir: -1 },
      ];
      // c wave: only include if it creates a visible local bump (cAmp > 1)
      if (p.cAmp && p.cAmp >= 1) {
        annots.splice(1, 0, { ch: 'c', hint: p.cCenter || 0.14, dir: 1 });
      }
      return annots;
    }

    function getPCWPAnnotations() {
      const p = getAnnotationParams('pcwp');
      if (!p) return [];
      const delay = p.timeDelay || 0.06;
      return [
        { ch: 'a', hint: (p.aCenter || 0.08) + delay, dir: 1 },
        { ch: 'x', hint: (p.xCenter || 0.20) + delay, dir: -1 },
        { ch: 'v', hint: (p.vCenter || 0.42) + delay, dir: 1 },
        { ch: 'y', hint: (p.yCenter || 0.58) + delay, dir: -1 },
      ];
    }

    traces.forEach(tr => {
      if (!traceVis[tr.id]) return;
      let annots;
      if (tr.id === 'ra') annots = getRAAnnotations();
      else if (tr.id === 'pcwp') annots = getPCWPAnnotations();
      else return;
      if (!annots.length) return;

      // Pre-compute actual extremum positions (once per frame, not per beat)
      // Skip labels where the feature is obliterated (e.g. x descent lost in severe TR)
      const resolved = [];
      annots.forEach(an => {
        const ext = findExtremum(tr.gen, an.hint, an.dir);
        // Verify it's a genuine local extremum, not just a slope
        const before = tr.gen(((ext.beat - 0.01) % 1 + 1) % 1);
        const after = tr.gen(((ext.beat + 0.01) % 1 + 1) % 1);
        const genuine = an.dir === 1
          ? (ext.mmHg >= before && ext.mmHg >= after)
          : (ext.mmHg <= before && ext.mmHg <= after);
        if (genuine) resolved.push({ ch: an.ch, beat: ext.beat, mmHg: ext.mmHg, dir: an.dir });
      });

      const color = getComputedColor(tr.color);
      ctx.save();
      ctx.font = `bold ${9 * DPR}px -apple-system, Helvetica Neue, sans-serif`;
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const scrollDPR = getScrollDPR();
      const firstBeatIdx = Math.floor(scrollDPR / pxPerBeat);
      const lastBeatIdx = Math.ceil((scrollDPR + w) / pxPerBeat);

      for (let bi = firstBeatIdx; bi <= lastBeatIdx; bi++) {
        resolved.forEach(r => {
          const worldPx = bi * pxPerBeat + r.beat * pxPerBeat;
          const screenPx = worldPx - scrollDPR;
          if (screenPx < -20 || screenPx > w + 20) return;

          const traceY = mmHgToY(r.mmHg, scale, h);
          const offset = r.dir * (-14 * DPR);
          const labelY = traceY + offset;

          ctx.globalAlpha = 0.85;
          ctx.fillText(r.ch, screenPx, labelY);
        });
      }
      ctx.restore();
    });
  }

  // ── HOCM post-PVC red arrow annotation ──────────────────────────
  if (currentLesson === 'hocm' && pvcState === 'post' && bufferActive) {
    // Find the Ao peak in the post-PVC beat region from the buffer
    const scrollDPR = getScrollDPR();
    let aoPeakPx = -1, aoPeakMmHg = -Infinity;
    let lvPeakPx = -1, lvPeakMmHg = -Infinity;
    // Scan visible buffer for the post-PVC beat (right-most ~1.5 beats)
    const scanStart = Math.max(0, w - pxPerBeat * 1.5);
    for (let px = Math.floor(scanStart); px < w; px++) {
      const wx = Math.round(px + scrollDPR);
      const entry = waveBuffer.get(wx);
      if (!entry) continue;
      if (entry.ao != null && entry.ao > aoPeakMmHg) {
        aoPeakMmHg = entry.ao; aoPeakPx = px;
      }
      if (entry.lv != null && entry.lv > lvPeakMmHg) {
        lvPeakMmHg = entry.lv; lvPeakPx = px;
      }
    }
    if (aoPeakPx > 0 && lvPeakPx > 0) {
      const { ao: baseAo } = getHOCMParams();
      const normalAoPeak = baseAo.SBP;
      ctx.save();
      // Red arrow at Ao peak pointing down — "↓ PP"
      const aoY = mmHgToY(aoPeakMmHg, scale, h);
      const arrowX = aoPeakPx;
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#ff1744';
      ctx.strokeStyle = '#ff1744';
      ctx.lineWidth = 2 * DPR;
      // Arrow shaft pointing down
      const arrowTop = aoY + 6 * DPR;
      const arrowBot = aoY + 28 * DPR;
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowTop);
      ctx.lineTo(arrowX, arrowBot);
      ctx.stroke();
      // Arrowhead
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowBot + 2 * DPR);
      ctx.lineTo(arrowX - 4 * DPR, arrowBot - 4 * DPR);
      ctx.lineTo(arrowX + 4 * DPR, arrowBot - 4 * DPR);
      ctx.closePath();
      ctx.fill();
      // Label
      ctx.font = `bold ${9 * DPR}px -apple-system, Helvetica Neue, sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText('↓ PP', arrowX + 6 * DPR, arrowBot);

      // Red arrow at LV peak pointing up — "↑ LVSP"
      const lvY = mmHgToY(lvPeakMmHg, scale, h);
      const lvArrowBot = lvY - 6 * DPR;
      const lvArrowTop = lvY - 28 * DPR;
      ctx.beginPath();
      ctx.moveTo(lvPeakPx, lvArrowBot);
      ctx.lineTo(lvPeakPx, lvArrowTop);
      ctx.stroke();
      // Arrowhead pointing up
      ctx.beginPath();
      ctx.moveTo(lvPeakPx, lvArrowTop - 2 * DPR);
      ctx.lineTo(lvPeakPx - 4 * DPR, lvArrowTop + 4 * DPR);
      ctx.lineTo(lvPeakPx + 4 * DPR, lvArrowTop + 4 * DPR);
      ctx.closePath();
      ctx.fill();
      // Label
      ctx.textAlign = 'right';
      ctx.fillText('↑ LVSP', lvPeakPx - 6 * DPR, lvArrowTop);
      ctx.restore();
    }
  }

  // Y-axis label
  ctx.save();
  ctx.font = `${9 * DPR}px -apple-system, Helvetica Neue, sans-serif`;
  ctx.fillStyle = getComputedColor('var(--text-dim)');
  ctx.translate(10 * DPR, h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillText('mmHg', 0, 0);
  ctx.restore();

  // Respiratory phase indicator (top-right corner)
  if (respEnabled) {
    const mod = getRespMod(); // -1 insp, +1 exp
    const barW = 80 * DPR, barH = 14 * DPR;
    const bx = w - barW - 12 * DPR, by = 10 * DPR;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx - 4 * DPR, by - 2 * DPR, barW + 8 * DPR, barH + 12 * DPR);
    // Bar background
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(bx, by, barW, barH);
    // Fill: green for inspiration, amber for expiration
    const fillW = Math.abs(mod) * barW / 2;
    if (mod < 0) {
      ctx.fillStyle = 'rgba(102,187,106,0.6)';
      ctx.fillRect(bx + barW / 2 - fillW, by, fillW, barH);
    } else {
      ctx.fillStyle = 'rgba(255,183,77,0.6)';
      ctx.fillRect(bx + barW / 2, by, fillW, barH);
    }
    // Center tick
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(bx + barW / 2, by); ctx.lineTo(bx + barW / 2, by + barH); ctx.stroke();
    // Labels
    ctx.font = `${7 * DPR}px -apple-system, Helvetica Neue, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText('INSP', bx, by + barH + 9 * DPR);
    ctx.textAlign = 'right';
    ctx.fillText('EXP', bx + barW, by + barH + 9 * DPR);
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ════════════════════════════════════════════════════════════════════

let lastTime = 0;

function animate(timestamp) {
  animId = requestAnimationFrame(animate);

  const dt = lastTime ? (timestamp - lastTime) / 1000 : 0.016;
  lastTime = timestamp;

  if (!paused) {
    // Advance respiratory cycle
    if (respEnabled) {
      respPhase += (2 * Math.PI * RESP_RATE / 60) * dt;
      if (respPhase > 2 * Math.PI) respPhase -= 2 * Math.PI;
    }

    // Scroll FIRST, then advance buffer — so buffer covers the new scroll position
    const pxPerSec = speed * 3.78;
    scrollX += pxPerSec * dt;

    // Advance buffer AFTER scroll so leading-edge pixels match what drawWaveforms will need
    if (bufferActive) advanceWaveBuffer();

    // PVC state machine (beat-based timing)
    if (pvcState !== 'none' && currentLesson === 'hocm') {
      const beatDuration = 60 / HR;
      const pxPerBeat = beatDuration * pxPerSec;
      const beatsSincePVC = (scrollX - pvcScrollStart) / pxPerBeat;

      if (pvcState === 'pvc' && beatsSincePVC >= 0.6) {
        pvcState = 'pause';
        pvcScrollStart = scrollX;
      } else if (pvcState === 'pause' && beatsSincePVC >= 0.8) {
        pvcState = 'post';
        pvcScrollStart = scrollX;
        updateTeaching();
      } else if (pvcState === 'post' && beatsSincePVC >= 2.0) {
        pvcState = 'none';
        clearWaveBuffer(); // PVC sequence done — return to stateless rendering
        const btn = document.getElementById('pvcBtn');
        if (btn) { btn.textContent = 'Trigger PVC'; btn.disabled = false; }
        updateTeaching();
      }
    }
  }

  // Always draw (needed after resize, lesson switch, etc.)
  drawECG(ecgCtx, ecgCanvas.width, ecgCanvas.height);
  drawWaveforms(waveCtx, waveCanvas.width, waveCanvas.height);
}

// ════════════════════════════════════════════════════════════════════
// RESIZE HANDLE (teaching panel)
// ════════════════════════════════════════════════════════════════════

(function() {
  const handle = document.getElementById('resizeHandle');
  let dragging = false, startY = 0, startH = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; startH = teachingPanel.offsetHeight;
    document.body.style.cursor = 'ns-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const diff = startY - e.clientY;
    teachingPanel.style.height = Math.max(80, startH + diff) + 'px';
    sizeCanvases();
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; document.body.style.cursor = ''; }
  });
})();

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════

window.addEventListener('resize', sizeCanvases);
// Keyboard: Space=pause, Left/Right=scrub
window.addEventListener('keydown', e => {
  // Don't capture when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') {
    e.preventDefault();
    togglePause();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    scrollX -= (speed * 3.78) * 0.15;
    if (scrollX < 0) scrollX = 0;
    if (bufferActive) advanceWaveBuffer();
    redrawNeeded = true;
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    scrollX += (speed * 3.78) * 0.15;
    if (bufferActive) advanceWaveBuffer();
    redrawNeeded = true;
  }
});

// Mouse drag on canvas to scrub
(function() {
  let dragging = false, dragStartX = 0, scrollStart = 0;
  const area = document.getElementById('canvasArea');
  area.style.cursor = 'grab';
  area.addEventListener('mousedown', e => {
    if (e.target.closest('.resize-handle')) return;
    dragging = true;
    dragStartX = e.clientX;
    scrollStart = scrollX;
    area.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = dragStartX - e.clientX;
    scrollX = Math.max(0, scrollStart + dx * (DPR));
    if (bufferActive) advanceWaveBuffer();
    redrawNeeded = true;
  });
  window.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; area.style.cursor = 'grab'; }
  });
})();

sizeCanvases();
switchLesson('normal');
animate(0);

// Brief pulse on resize handle to hint it's draggable
setTimeout(() => document.getElementById('resizeHandle').classList.add('pulse'), 2000);
setTimeout(() => document.getElementById('resizeHandle').classList.remove('pulse'), 4000);

</script>
