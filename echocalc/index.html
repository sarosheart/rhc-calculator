<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// SEVERITY GRADERS (return {label, klass})
// ═══════════════════════════════════════════════════════════
function gradePASP(v) {
  if (v < 35) return { label: 'normal', klass: 'normal' };
  if (v < 50) return { label: 'mild PH', klass: 'mild' };
  if (v < 70) return { label: 'moderate PH', klass: 'moderate' };
  return { label: 'severe PH', klass: 'severe' };
}
function gradeCI(v) {
  if (v < 1.8) return { label: 'cardiogenic shock', klass: 'severe' };
  if (v < 2.2) return { label: 'low output', klass: 'moderate' };
  if (v <= 4.0) return { label: 'normal', klass: 'normal' };
  return { label: 'high output', klass: 'mild' };
}

// ═══════════════════════════════════════════════════════════
// MODULE REGISTRY
// ═══════════════════════════════════════════════════════════
const MODULES = {
  // ─────────────────────────────────────────────────────────
  pasp: {
    id: 'pasp',
    title: 'PASP from TR V<sub>max</sub>',
    purpose: 'Estimate pulmonary artery systolic pressure from the tricuspid regurgitation jet using the simplified Bernoulli equation, plus right atrial pressure from IVC characteristics.',
    formula: 'PASP = 4 · (TR&nbsp;V<sub>max</sub>)<sup>2</sup> + RAP',
    inputs: [
      { type: 'slider', key: 'vmax', label: 'TR V<sub>max</sub>', unit: 'm/s', min: 1.5, max: 6.0, step: 0.05, default: 2.8, decimals: 2 },
      { type: 'picker', key: 'rap',  label: 'RAP (from IVC)', default: 8,
        options: [
          { v: 3,  text: '3', help: 'IVC ≤ 2.1 cm, >50% collapse — "low"' },
          { v: 8,  text: '8', help: 'IVC ≤ 2.1 cm, <50% collapse — "intermediate-low"' },
          { v: 15, text: '15', help: 'IVC > 2.1 cm, >50% collapse — "intermediate-high"' },
          { v: 20, text: '20', help: 'IVC > 2.1 cm, <50% collapse — "high"' },
        ]
      },
    ],
    compute: (p) => {
      const grad = 4 * p.vmax * p.vmax;
      const pasp = grad + p.rap;
      return [
        { key: 'grad', label: 'TR gradient',  value: grad.toFixed(0), unit: 'mmHg' },
        { key: 'rap',  label: 'RAP',          value: p.rap.toFixed(0), unit: 'mmHg' },
        { key: 'pasp', label: 'PASP',         value: pasp.toFixed(0), unit: 'mmHg', severity: gradePASP(pasp) },
      ];
    },
    draw: drawPASP,
    pitfalls: [
      'TR V<sub>max</sub> requires a complete CW envelope — incomplete jets underestimate pressure (the contour ends before the true peak).',
      'Always use multiple windows (apical, RV inflow, parasternal) to find the highest velocity — eccentric jets are easy to miss off-axis.',
      'PASP = mean PA pressure only when there is no RVOT/PV obstruction. With pulmonic stenosis or RVOT obstruction, PASP > PAP.',
      'The 2015 ASE guidelines collapsed RAP into 3 / 8 / 15 mmHg buckets. Many labs still use a 4-bucket system (3 / 8 / 15 / 20) — same idea, finer granularity.',
    ],
  },

  // ─────────────────────────────────────────────────────────
  doppler_co: {
    id: 'doppler_co',
    title: 'Doppler Cardiac Output',
    purpose: 'Estimate stroke volume and cardiac output from LVOT diameter and the LVOT pulsed-wave velocity-time integral. Standard reporting workflow whenever LVOT VTI is available.',
    formula: 'SV = π·(LVOT/2)<sup>2</sup> · LVOT&nbsp;VTI &nbsp;·&nbsp; CO = SV · HR &nbsp;·&nbsp; CI = CO / BSA',
    inputs: [
      { type: 'slider', key: 'lvot', label: 'LVOT diameter', unit: 'cm', min: 1.6, max: 2.6, step: 0.01, default: 2.10, decimals: 2 },
      { type: 'slider', key: 'vti',  label: 'LVOT VTI',      unit: 'cm', min: 8,   max: 30,  step: 0.5, default: 20,    decimals: 1 },
      { type: 'slider', key: 'hr',   label: 'Heart rate',    unit: 'bpm',min: 40,  max: 150, step: 1,   default: 70,    decimals: 0 },
      { type: 'slider', key: 'bsa',  label: 'BSA',           unit: 'm²', min: 1.4, max: 2.4, step: 0.01, default: 1.85, decimals: 2 },
    ],
    compute: (p) => {
      const area = Math.PI * Math.pow(p.lvot / 2, 2);  // cm²
      const sv = area * p.vti;                         // mL
      const co = sv * p.hr / 1000;                     // L/min
      const ci = co / p.bsa;                           // L/min/m²
      return [
        { key: 'area', label: 'LVOT area', value: area.toFixed(2), unit: 'cm²' },
        { key: 'sv',   label: 'Stroke volume', value: sv.toFixed(0),  unit: 'mL' },
        { key: 'co',   label: 'Cardiac output', value: co.toFixed(2), unit: 'L/min' },
        { key: 'ci',   label: 'Cardiac index',  value: ci.toFixed(2), unit: 'L/min/m²', severity: gradeCI(ci) },
      ];
    },
    draw: drawDopplerCO,
    pitfalls: [
      'LVOT diameter is squared — a 10% error in diameter is a 21% error in SV. Measure mid-systole, parasternal long-axis, inner-edge to inner-edge, just below the valve.',
      'LVOT VTI must be acquired with the PW sample volume *just proximal* to the AV (5–10 mm), aligned with flow within 20° of beam.',
      'Assumes a circular LVOT. In reality the LVOT is elliptical (especially in calcific AS) — Doppler tends to underestimate true SV. 3D LVOT planimetry is more accurate.',
      'Don\'t use the LVOT-CO method if the pulsed-wave envelope shows aliasing or spectral broadening — that means flow is no longer laminar.',
    ],
  },
};

// ═══════════════════════════════════════════════════════════
// CANVAS — SHARED HELPERS
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('vizCanvas');
const ctx = canvas.getContext('2d');
const DPR = window.devicePixelRatio || 1;
let W = 0, H = 0;

function resizeCanvas() {
  const r = canvas.parentElement.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(DPR, DPR);
}

// ═══════════════════════════════════════════════════════════
// VISUALIZATIONS
// ═══════════════════════════════════════════════════════════

// PASP — TR jet CW envelope (downward) + IVC sniff sketch
function drawPASP(p, t) {
  ctx.clearRect(0, 0, W, H);
  // Layout: left 2/3 = spectral, right 1/3 = IVC sketch
  const splitX = W * 0.62;

  // ────────── Spectral envelope ──────────
  // ECG strip on top
  ctx.strokeStyle = '#3b8b59';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  const ecgY = 14;
  let ecgX = 0;
  ctx.moveTo(0, ecgY);
  // simulated rhythm
  function ecgBeat(x) {
    ctx.lineTo(x + 8, ecgY);
    ctx.lineTo(x + 11, ecgY - 5);
    ctx.lineTo(x + 13, ecgY + 3);
    ctx.lineTo(x + 16, ecgY - 10);
    ctx.lineTo(x + 19, ecgY + 6);
    ctx.lineTo(x + 22, ecgY);
  }
  const beatSpacing = splitX / 3;
  for (let b = 0; b < 3; b++) ecgBeat(b * beatSpacing + 8);
  ctx.lineTo(splitX, ecgY);
  ctx.stroke();

  // Spectral box
  const sx = 6, sy = 26, sw = splitX - 12, sh = H - 38;
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(sx, sy, sw, sh);

  // 0 baseline
  const baseline = sy + 8;
  ctx.strokeStyle = '#7a8499';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(sx, baseline); ctx.lineTo(sx + sw, baseline); ctx.stroke();
  ctx.fillStyle = '#9aa3b3'; ctx.font = '9px DM Sans, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('0 m/s', sx + 4, baseline - 2);

  // Velocity ticks (downward — TR jet appears below baseline on apical view)
  const maxV = 6.0;  // m/s
  const vToY = v => baseline + (sh - 12) * (v / maxV);
  for (let v = 1; v <= 6; v++) {
    const y = vToY(v);
    ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + 4, y); ctx.stroke();
    ctx.fillText(v + '', sx + 6, y + 3);
  }

  // TR envelope — 3 beats, peak velocity = p.vmax
  const peakV = p.vmax;
  const beats = 3;
  const beatW = sw / beats;
  for (let b = 0; b < beats; b++) {
    const bx = sx + b * beatW;
    // Envelope path — asymmetric peak shape
    ctx.fillStyle = 'rgba(220, 60, 50, 0.6)';
    ctx.shadowColor = 'rgba(255, 80, 60, 0.2)';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(bx + beatW * 0.10, baseline);
    // Rise (steep)
    for (let i = 0; i <= 10; i++) {
      const u = i / 10;
      const pv = peakV * (1 - Math.pow(1 - u, 2));
      ctx.lineTo(bx + beatW * (0.10 + u * 0.18), vToY(pv));
    }
    // Plateau near peak (small)
    for (let i = 0; i <= 6; i++) {
      const u = i / 6;
      ctx.lineTo(bx + beatW * (0.28 + u * 0.10), vToY(peakV * (1 - 0.04 * u)));
    }
    // Fall (longer)
    for (let i = 0; i <= 15; i++) {
      const u = i / 15;
      const pv = peakV * Math.pow(1 - u, 1.6);
      ctx.lineTo(bx + beatW * (0.38 + u * 0.45), vToY(pv));
    }
    ctx.lineTo(bx + beatW * 0.83, baseline);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // Fainter outer haze
    ctx.fillStyle = 'rgba(220, 60, 50, 0.15)';
    ctx.beginPath();
    ctx.moveTo(bx + beatW * 0.08, baseline);
    for (let i = 0; i <= 15; i++) {
      const u = i / 15;
      const pv = peakV * (1 - Math.pow(1 - u, 2)) * 1.05;
      ctx.lineTo(bx + beatW * (0.08 + u * 0.20), vToY(pv));
    }
    for (let i = 0; i <= 18; i++) {
      const u = i / 18;
      const pv = peakV * 1.05 * Math.pow(1 - u, 1.5);
      ctx.lineTo(bx + beatW * (0.28 + u * 0.55), vToY(pv));
    }
    ctx.lineTo(bx + beatW * 0.85, baseline);
    ctx.closePath();
    ctx.fill();
  }

  // Caliper at peak of last beat — kept ABOVE the trace's reach (in the envelope plot, the trace lives BELOW baseline — y > baseline. So caliper above the spectral box is safe).
  const lastBx = sx + (beats - 1) * beatW;
  const peakX = lastBx + beatW * 0.32;
  const peakY = vToY(peakV);
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([3, 2]);
  ctx.beginPath();
  ctx.moveTo(peakX - 6, peakY); ctx.lineTo(peakX + 6, peakY);
  ctx.stroke();
  ctx.setLineDash([]);
  // Label OUTSIDE the spectral region (above baseline, in the small strip between baseline and ECG)
  ctx.fillStyle = '#fbbf24';
  ctx.font = '600 11px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  // Place label ABOVE baseline (y < baseline = above the trace which lives below baseline)
  ctx.fillText(peakV.toFixed(2) + ' m/s', peakX, baseline - 4);

  // ────────── IVC sketch ──────────
  const ix = splitX + 8;
  const iy = sy;
  const iw = W - ix - 6;
  const ih = sh;
  // Outer panel
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(ix, iy, iw, ih);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(ix, iy, iw, ih);

  ctx.fillStyle = '#9aa3b3';
  ctx.font = '600 10px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('IVC behavior', ix + iw / 2, iy + 14);

  // Animated IVC: outline that pulsates (sniff = collapse)
  // Sniff cycle ~3 sec; collapse based on RAP bucket
  const collapseFraction = p.rap === 3 ? 0.7 : p.rap === 8 ? 0.30 : p.rap === 15 ? 0.55 : 0.10;
  const baseDiam = p.rap >= 15 ? 0.85 : 0.55; // proportion of available width
  // Sniff phase 0-1
  const sniffPhase = (Math.sin(t / 800) + 1) / 2; // 0..1, slow oscillation
  const currentCollapse = 1 - collapseFraction * sniffPhase;
  const ivcCx = ix + iw / 2;
  const ivcCy = iy + ih * 0.55;
  const ivcMaxW = iw * 0.65;
  const ivcW = ivcMaxW * baseDiam * currentCollapse;
  const ivcH = ih * 0.42;

  // Vessel walls
  ctx.strokeStyle = '#4a5568';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ivcCx - ivcMaxW * baseDiam / 2, ivcCy - ivcH / 2);
  ctx.lineTo(ivcCx - ivcMaxW * baseDiam / 2, ivcCy + ivcH / 2);
  ctx.moveTo(ivcCx + ivcMaxW * baseDiam / 2, ivcCy - ivcH / 2);
  ctx.lineTo(ivcCx + ivcMaxW * baseDiam / 2, ivcCy + ivcH / 2);
  ctx.stroke();

  // Inner blood column (animated)
  const grad = ctx.createLinearGradient(ivcCx - ivcW / 2, 0, ivcCx + ivcW / 2, 0);
  grad.addColorStop(0, 'rgba(220, 60, 50, 0.2)');
  grad.addColorStop(0.5, 'rgba(220, 60, 50, 0.55)');
  grad.addColorStop(1, 'rgba(220, 60, 50, 0.2)');
  ctx.fillStyle = grad;
  ctx.fillRect(ivcCx - ivcW / 2, ivcCy - ivcH / 2 + 1, ivcW, ivcH - 2);

  // Sniff label
  ctx.fillStyle = '#9aa3b3';
  ctx.font = '10px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(sniffPhase < 0.5 ? '— exhale —' : '— sniff —', ivcCx, iy + ih - 8);
  // RAP label
  ctx.fillStyle = '#fbbf24';
  ctx.font = '600 11px DM Sans, sans-serif';
  ctx.fillText('RAP = ' + p.rap + ' mmHg', ivcCx, ivcCy - ivcH / 2 - 6);
}

// Doppler CO — LVOT cross-section + spectral envelope
function drawDopplerCO(p, t) {
  ctx.clearRect(0, 0, W, H);
  const splitX = W * 0.36;

  // ────────── LVOT cross-section (left) ──────────
  const cx = splitX / 2;
  const cy = H / 2;
  const radius = Math.min(splitX * 0.28, H * 0.28);

  // Aortic root (outer ring)
  ctx.strokeStyle = '#4a5568';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, radius * 1.25, 0, Math.PI * 2);
  ctx.stroke();

  // LVOT lumen
  ctx.fillStyle = 'rgba(220, 60, 50, 0.25)';
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();

  // Animated flow particles
  const numParticles = 8;
  for (let i = 0; i < numParticles; i++) {
    const ang = (i / numParticles) * Math.PI * 2 + (t / 200);
    const r = radius * (0.4 + 0.5 * Math.abs(Math.sin(t / 400 + i)));
    const px = cx + Math.cos(ang) * r;
    const py = cy + Math.sin(ang) * r;
    ctx.fillStyle = 'rgba(220, 60, 50, 0.7)';
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Diameter caliper — placed at the BOTTOM of the cross-section, OUTSIDE the lumen
  const calY = cy + radius * 1.45;
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 2]);
  ctx.beginPath();
  ctx.moveTo(cx - radius, calY); ctx.lineTo(cx + radius, calY);
  ctx.moveTo(cx - radius, calY - 4); ctx.lineTo(cx - radius, calY + 4);
  ctx.moveTo(cx + radius, calY - 4); ctx.lineTo(cx + radius, calY + 4);
  ctx.stroke();
  ctx.setLineDash([]);
  // Label below caliper, outside the lumen
  ctx.fillStyle = '#fbbf24';
  ctx.font = '600 11px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(p.lvot.toFixed(2) + ' cm', cx, calY + 14);

  // Title (top)
  ctx.fillStyle = '#9aa3b3';
  ctx.font = '600 10px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('LVOT cross-section', cx, 14);

  // ────────── Spectral envelope (right) ──────────
  const sx = splitX + 8, sy = 22, sw = W - sx - 6, sh = H - 32;
  ctx.fillStyle = '#0d1019';
  ctx.fillRect(sx, sy, sw, sh);

  // baseline at top of spectral region (LVOT outflow goes upward away from probe = downward on spectral display from baseline)
  // For LVOT outflow on apical: away from probe = below baseline. We'll draw a baseline near top of spectral box.
  const bL = sy + sh - 10;
  ctx.strokeStyle = '#7a8499';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(sx, bL); ctx.lineTo(sx + sw, bL); ctx.stroke();
  ctx.fillStyle = '#9aa3b3'; ctx.font = '9px DM Sans, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('0 m/s', sx + 4, bL + 9);

  // Title
  ctx.fillStyle = '#9aa3b3';
  ctx.font = '600 10px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('LVOT pulsed-wave envelope', sx + sw / 2, sy + 12);

  // Envelope: 3 beats, peakV scales with p.vti (relationship: VTI = peakV × duration ≈ peakV × 0.3 sec; so peakV ≈ VTI/30 m/s). Use peakV = vti / 25 (illustrative).
  const peakV = Math.max(0.4, p.vti / 25);
  const maxV = 1.6;
  const vToY = v => bL - (sh - 24) * (v / maxV);
  // tick at 1 m/s
  const y1 = vToY(1);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.moveTo(sx, y1); ctx.lineTo(sx + sw, y1); ctx.stroke();
  ctx.fillStyle = '#7a8499'; ctx.font = '9px DM Sans, sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('1 m/s', sx + 4, y1 - 2);

  // Beats (HR-aware: visible beats = 3; sweep speed implicit)
  const beats = 3;
  const beatW = sw / beats;
  for (let b = 0; b < beats; b++) {
    const bx = sx + b * beatW;
    ctx.fillStyle = 'rgba(255, 200, 90, 0.55)';
    ctx.shadowColor = 'rgba(255, 200, 90, 0.2)';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.moveTo(bx + beatW * 0.05, bL);
    for (let i = 0; i <= 10; i++) {
      const u = i / 10;
      const pv = peakV * (1 - Math.pow(1 - u, 1.5));
      ctx.lineTo(bx + beatW * (0.05 + u * 0.18), vToY(pv));
    }
    for (let i = 0; i <= 18; i++) {
      const u = i / 18;
      const pv = peakV * Math.pow(1 - u, 1.4);
      ctx.lineTo(bx + beatW * (0.23 + u * 0.40), vToY(pv));
    }
    ctx.lineTo(bx + beatW * 0.63, bL);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ═══════════════════════════════════════════════════════════
// MODULE LIFECYCLE
// ═══════════════════════════════════════════════════════════
let activeModule = 'pasp';
let inputState = {}; // current parameter values for active module

function buildSidebar() {
  const list = document.getElementById('moduleList');
  let i = 1;
  for (const id of Object.keys(MODULES)) {
    const m = MODULES[id];
    const btn = document.createElement('button');
    btn.className = 'module-btn' + (id === activeModule ? ' active' : '');
    btn.dataset.module = id;
    btn.innerHTML = `<span class="num">${i}</span><span>${m.title.replace(/<sub>(.*?)<\/sub>/g, '$1').replace(/<sup>(.*?)<\/sup>/g, '$1')}</span>`;
    btn.onclick = () => selectModule(id);
    list.appendChild(btn);
    i++;
  }
}

function selectModule(id) {
  activeModule = id;
  document.querySelectorAll('.module-btn').forEach(b => b.classList.toggle('active', b.dataset.module === id));
  const m = MODULES[id];
  document.getElementById('modTitle').innerHTML = m.title;
  document.getElementById('modPurpose').textContent = m.purpose;
  document.getElementById('modFormula').innerHTML = m.formula;
  buildInputs(m);
  recompute();
}

function buildInputs(m) {
  const wrap = document.getElementById('modInputs');
  wrap.innerHTML = '';
  inputState = {};
  for (const inp of m.inputs) {
    inputState[inp.key] = inp.default;
    if (inp.type === 'slider') {
      const row = document.createElement('div');
      row.className = 'input-row';
      row.innerHTML = `
        <label>${inp.label}</label>
        <input type="range" min="${inp.min}" max="${inp.max}" step="${inp.step}" value="${inp.default}" data-key="${inp.key}" data-decimals="${inp.decimals || 1}">
        <span class="val" id="val-${inp.key}">${(+inp.default).toFixed(inp.decimals || 1)}</span>
        <span class="unit">${inp.unit}</span>
      `;
      wrap.appendChild(row);
      const slider = row.querySelector('input');
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        inputState[inp.key] = v;
        document.getElementById('val-' + inp.key).textContent = v.toFixed(inp.decimals || 1);
        recompute();
      });
    } else if (inp.type === 'picker') {
      const row = document.createElement('div');
      row.className = 'picker-row';
      row.innerHTML = `<label>${inp.label}</label><div class="picker-options"></div><div class="picker-help" id="help-${inp.key}"></div>`;
      const opts = row.querySelector('.picker-options');
      const help = row.querySelector('.picker-help');
      for (const opt of inp.options) {
        const b = document.createElement('button');
        b.className = 'picker-opt' + (opt.v === inp.default ? ' active' : '');
        b.textContent = opt.text;
        b.onclick = () => {
          inputState[inp.key] = opt.v;
          opts.querySelectorAll('.picker-opt').forEach(o => o.classList.remove('active'));
          b.classList.add('active');
          help.textContent = opt.help;
          recompute();
        };
        opts.appendChild(b);
        if (opt.v === inp.default) help.textContent = opt.help;
      }
      wrap.appendChild(row);
    }
  }
}

function recompute() {
  const m = MODULES[activeModule];
  const out = m.compute(inputState);
  const wrap = document.getElementById('modOutputs');
  wrap.innerHTML = out.map(o => {
    const sev = o.severity ? `<div class="severity-pill ${o.severity.klass}">${o.severity.label}</div>` : '';
    return `<div class="output-cell">
      <div class="output-label">${o.label}</div>
      <div class="output-value">${o.value}<span class="output-unit">${o.unit}</span></div>
      ${sev}
    </div>`;
  }).join('');
  // Pitfalls
  const pitfallsWrap = document.getElementById('modPitfalls');
  pitfallsWrap.innerHTML = m.pitfalls.map(p => `<div class="pitfall">${p}</div>`).join('');
}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
function loop(t) {
  const m = MODULES[activeModule];
  if (m && m.draw) m.draw(inputState, t);
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
// DARK MODE
// ═══════════════════════════════════════════════════════════
function toggleDark() {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  document.getElementById('darkToggle').textContent = isDark ? 'Light Mode' : 'Dark Mode';
  try { localStorage.setItem('cathmath_dark', isDark ? '1' : '0'); } catch(e) {}
}
try {
  const pref = localStorage.getItem('cathmath_dark');
  if (pref === '0') {
    document.body.classList.remove('dark');
    document.getElementById('darkToggle').textContent = 'Dark Mode';
  }
} catch(e) {}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
buildSidebar();
selectModule('pasp');
requestAnimationFrame(loop);
</script>
